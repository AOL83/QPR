<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MEM Palace Game Terminal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    :root {
      --bg0: #030201;
      --bg1: #080403;
      --bg2: #3b1d0b;
      --panel: rgba(0, 0, 0, 0.34);
      --panel2: rgba(12, 6, 3, 0.72);
      --border: rgba(255, 180, 90, 0.22);
      --border-strong: rgba(255, 180, 90, 0.52);
      --text: #fff3df;
      --muted: rgba(255, 230, 199, 0.68);
      --faint: rgba(255, 230, 199, 0.42);
      --accent: #fb923c;
      --accent2: #fdba74;
      --green: #86efac;
      --red: #fca5a5;
      --blue: #7dd3fc;
      --purple: #d8b4fe;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 0% 0%, var(--bg2), var(--bg1) 36%, var(--bg0) 72%);
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.46; }

    .app {
      width: min(100%, 1400px);
      margin: 0 auto;
      padding: 16px;
    }

    .stack { display: grid; gap: 16px; }
    .card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 20px 60px var(--shadow);
      padding: 16px;
      overflow: hidden;
    }

    .header {
      border-radius: 30px;
      padding: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .title-row { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 30px; filter: drop-shadow(0 0 12px rgba(251, 146, 60, 0.45)); }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(28px, 4vw, 44px); letter-spacing: -0.04em; line-height: 1; }
    h2 { font-size: 18px; }
    h3 { font-size: 26px; color: var(--accent2); }
    .muted { color: var(--muted); }
    .faint { color: var(--faint); }
    .small { font-size: 13px; }
    .tiny { font-size: 12px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .truncate { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 170, 80, 0.08);
      color: var(--text);
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }
    .pill.green { border-color: rgba(134, 239, 172, 0.35); color: var(--green); background: rgba(34, 197, 94, 0.09); }
    .pill.red { border-color: rgba(252, 165, 165, 0.35); color: var(--red); background: rgba(239, 68, 68, 0.09); }
    .pill.blue { border-color: rgba(125, 211, 252, 0.35); color: var(--blue); background: rgba(14, 165, 233, 0.09); }
    .pill.purple { border-color: rgba(216, 180, 254, 0.35); color: var(--purple); background: rgba(168, 85, 247, 0.09); }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--panel);
      position: sticky;
      top: 8px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .tab, .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 16px;
      padding: 10px 13px;
      min-height: 40px;
      font-weight: 800;
      color: var(--text);
      background: transparent;
      transition: 160ms ease;
    }
    .tab:hover, .btn.ghost:hover { background: rgba(251, 146, 60, 0.11); }
    .tab.active, .btn.solid {
      color: #100602;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 10px 32px rgba(251, 146, 60, 0.25);
    }
    .btn.ghost { border: 1px solid var(--border); background: rgba(0, 0, 0, 0.18); }
    .btn.full { width: 100%; }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .aside { display: grid; gap: 16px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat { border-radius: 16px; background: rgba(0, 0, 0, 0.24); padding: 12px; }
    .stat b { display: block; font-size: 28px; margin-top: 4px; }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
    .space { display: grid; gap: 12px; }
    .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .between { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }

    .field { display: grid; gap: 6px; }
    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.34);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    .textarea { min-height: 140px; resize: vertical; }

    .item {
      border: 1px solid rgba(255, 180, 90, 0.15);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.24);
      padding: 12px;
    }
    .item.active { border-color: var(--border-strong); background: rgba(251, 146, 60, 0.10); }
    .room-button { width: 100%; text-align: left; color: inherit; }
    .hidden { display: none; }

    .viewer {
      min-height: 480px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #000;
      overflow: hidden;
    }
    iframe.viewer, video.viewer { display: block; object-fit: contain; }

    .capture-thumb {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #000;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      max-width: min(420px, calc(100vw - 32px));
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.85);
      color: var(--text);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.6);
      padding: 12px 14px;
      z-index: 50;
      display: none;
    }
    .toast.show { display: block; }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .grid-3, .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .app { padding: 10px; }
      .header { padding: 18px; align-items: flex-start; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .tabs { position: static; }
      .tab, .btn { width: 100%; }
      .between { display: grid; }
    }
  </style>
</head>
<body>
  <div id="app" class="app stack"></div>
  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = "mem-palace-game-terminal-v1";
    const now = () => new Date().toISOString();

    const tabs = [
      ["load", "📦", "Load"],
      ["inspect", "🔎", "Inspect"],
      ["play", "▶️", "Run / Attach"],
      ["cards", "💳", "Memory Cards"],
      ["history", "🗄️", "Drawers"],
      ["palace", "🗺️", "Palace"],
      ["blueprint", "🕸️", "Blueprint"],
      ["timeline", "📝", "Timeline"],
      ["notes", "📖", "Notes"],
      ["build", "✨", "Build"]
    ];

    const seedProject = {
      project: {
        id: "ff7-pc-beta",
        title: "Final Fantasy VII PC Beta Map",
        subtitle: "Game Load Test Console",
        type: "game-companion",
        createdAt: now(),
        updatedAt: now()
      },
      package: {
        name: "No package loaded",
        sourceType: "none",
        runMode: "none",
        entryCandidates: [],
        detectedFolders: [],
        detectedFiles: [],
        detectedScripts: [],
        detectedAssets: [],
        detectedExecutables: [],
        detectedJson: [],
        warnings: [],
        importReport: null
      },
      runtime: {
        status: "idle",
        runMode: "none",
        internalHtml: "",
        internalEntry: "",
        externalInstructions: []
      },
      currentNodeId: "midgar",
      nodes: [
        {
          id: "midgar",
          type: "location",
          title: "Midgar",
          description: "Central city hub and opening region.",
          connections: ["sector-7", "reactor-1", "shinra-building"],
          characters: ["cloud", "barret", "tifa", "aerith"],
          items: [],
          events: ["evt-opening"],
          screenshots: [],
          notes: ["Use this as the first palace wing for the beta test."],
          tags: ["city", "opening", "hub"],
          createdAt: now()
        },
        {
          id: "reactor-1",
          type: "location",
          title: "Mako Reactor 1",
          description: "Opening bombing mission area.",
          connections: ["midgar", "guard-scorpion"],
          characters: ["cloud", "barret", "biggs", "wedge", "jessie"],
          items: [], events: ["evt-bombing-mission"], screenshots: [], notes: [],
          tags: ["reactor", "mission", "midgar"],
          createdAt: now()
        },
        {
          id: "sector-7",
          type: "location",
          title: "Sector 7",
          description: "Avalanche base area and early story hub.",
          connections: ["midgar", "seventh-heaven"],
          characters: ["cloud", "barret", "tifa"],
          items: [], events: [], screenshots: [], notes: [], tags: ["slums", "avalanche"],
          createdAt: now()
        },
        {
          id: "shinra-building",
          type: "location",
          title: "Shinra Building",
          description: "Major Midgar infiltration sequence.",
          connections: ["midgar"],
          characters: ["cloud", "barret", "tifa", "aerith", "red-xiii"],
          items: [], events: [], screenshots: [], notes: [], tags: ["midgar", "shinra", "infiltration"],
          createdAt: now()
        },
        {
          id: "guard-scorpion",
          type: "battle",
          title: "Guard Scorpion",
          description: "First boss encounter. Watch the tail warning.",
          connections: ["reactor-1"],
          characters: ["cloud", "barret"],
          items: [], events: [], screenshots: [],
          notes: ["Capture battle timing and tutorial dialogue."],
          tags: ["boss", "tutorial", "reactor-1"],
          createdAt: now()
        }
      ],
      edges: [
        { id: "edge-midgar-reactor", from: "midgar", to: "reactor-1", label: "mission route" },
        { id: "edge-reactor-boss", from: "reactor-1", to: "guard-scorpion", label: "boss trigger" },
        { id: "edge-midgar-sector", from: "midgar", to: "sector-7", label: "hub path" }
      ],
      timeline: [
        {
          id: "evt-opening",
          timestamp: now(),
          nodeId: "midgar",
          type: "story",
          title: "Opening sequence",
          summary: "Begin mapping the first FF7 run as a memory palace.",
          tags: ["opening"]
        },
        {
          id: "evt-bombing-mission",
          timestamp: now(),
          nodeId: "reactor-1",
          type: "story",
          title: "Bombing mission begins",
          summary: "Cloud joins Avalanche during the Reactor 1 mission.",
          tags: ["mission", "reactor"]
        }
      ],
      inventory: [],
      characters: [
        { id: "cloud", name: "Cloud Strife", role: "party", notes: [] },
        { id: "barret", name: "Barret Wallace", role: "party", notes: [] },
        { id: "tifa", name: "Tifa Lockhart", role: "party", notes: [] },
        { id: "aerith", name: "Aerith Gainsborough", role: "party", notes: [] }
      ],
      observations: [],
      captures: [],
      memoryCards: { gameCards: [], palCards: [], pairs: [], activePairId: "" },
      progressionDrawers: { drawers: [], activeDrawerId: "", pinnedDrawerIds: [] }
    };

    let state = {
      data: loadStoredData(),
      activeTab: "load",
      noteText: "",
      newNodeTitle: "",
      captureStream: null
    };

    function loadStoredData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return normaliseData(JSON.parse(raw));
      } catch (error) {
        console.warn("Stored project could not be loaded", error);
      }
      return structuredCloneSafe(seedProject);
    }

    function structuredCloneSafe(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function normaliseData(data) {
      const next = { ...structuredCloneSafe(seedProject), ...(data || {}) };
      next.project = { ...seedProject.project, ...(data?.project || {}) };
      next.package = { ...seedProject.package, ...(data?.package || {}) };
      next.runtime = { ...seedProject.runtime, ...(data?.runtime || {}) };
      next.nodes = Array.isArray(data?.nodes) ? data.nodes : seedProject.nodes;
      next.edges = Array.isArray(data?.edges) ? data.edges : seedProject.edges;
      next.timeline = Array.isArray(data?.timeline) ? data.timeline : seedProject.timeline;
      next.captures = Array.isArray(data?.captures) ? data.captures : [];
      next.memoryCards = {
        gameCards: [], palCards: [], pairs: [], activePairId: "",
        ...(data?.memoryCards || {})
      };
      next.progressionDrawers = {
        drawers: [], activeDrawerId: "", pinnedDrawerIds: [],
        ...(data?.progressionDrawers || {})
      };
      return next;
    }

    function persist() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
      } catch (error) {
        console.warn("Project could not be saved to localStorage", error);
        toast("Local browser storage is full. Export the project or full session to keep your data.");
      }
    }

    function setData(nextData) {
      state.data = normaliseData({
        ...nextData,
        project: { ...(nextData.project || {}), updatedAt: now() }
      });
      persist();
      render();
    }

    function updateData(updater) {
      const next = typeof updater === "function" ? updater(state.data) : updater;
      setData(next);
    }

    function setTab(tab) {
      state.activeTab = tab;
      render();
    }

    function uid(prefix = "id") {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function ext(name = "") {
      const parts = String(name).toLowerCase().split(".");
      return parts.length > 1 ? parts.pop() : "";
    }

    function slug(input = "mem-palace") {
      return String(input).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "mem-palace";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function downloadText(filename, text, type = "text/plain") {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 3600);
    }

    function getMemoryCards() {
      return state.data.memoryCards || { gameCards: [], palCards: [], pairs: [], activePairId: "" };
    }

    function getDrawers() {
      return state.data.progressionDrawers || { drawers: [], activeDrawerId: "", pinnedDrawerIds: [] };
    }

    function getCurrentNode() {
      return state.data.nodes.find(node => node.id === state.data.currentNodeId) || state.data.nodes[0] || null;
    }

    function statusTone(status) {
      if (status === "synced") return "green";
      if (status === "out-of-sync" || status === "conflict") return "red";
      if (String(status || "").startsWith("missing")) return "red";
      if (status === "legacy") return "purple";
      return "blue";
    }

    function getPairStatus(gameCard, palCard) {
      if (!gameCard && !palCard) return "unpaired";
      if (!gameCard) return "missing-gamecard";
      if (!palCard) return "missing-palcard";
      const pairing = palCard.pairing || {};
      if (!pairing.gameCardId || pairing.gameCardId !== gameCard.id) return "unpaired";
      if (pairing.gameSaveHash && gameCard.saveFile?.hash && pairing.gameSaveHash !== gameCard.saveFile.hash) {
        return "out-of-sync";
      }
      return "synced";
    }

    function getPairViews() {
      const cards = getMemoryCards();
      return (cards.pairs || []).map(pair => {
        const gameCard = (cards.gameCards || []).find(card => card.id === pair.gameCardId);
        const palCard = (cards.palCards || []).find(card => card.id === pair.palCardId);
        return { ...pair, gameCard, palCard, status: getPairStatus(gameCard, palCard) };
      });
    }

    function buildRouteFromNode(nodes, nodeId) {
      const node = nodes.find(item => item.id === nodeId);
      if (!node) return [];
      const route = [node.id];
      for (const connection of node.connections || []) {
        if (!route.includes(connection)) route.unshift(connection);
        if (route.length >= 8) break;
      }
      return Array.from(new Set(route));
    }

    function inspectFiles(files, sourceType, packageName) {
      const fileList = files.map(file => ({
        name: file.name || String(file.path || "file").split("/").pop(),
        path: file.path || file.webkitRelativePath || file.name,
        size: file.size || 0,
        type: file.type || "",
        extension: ext(file.name || file.path || "")
      }));

      const folders = Array.from(new Set(
        fileList.map(file => String(file.path).split("/").slice(0, -1).join("/")).filter(Boolean)
      ));
      const scripts = fileList.filter(file => ["js", "ts", "mjs", "jsx", "tsx"].includes(file.extension));
      const assets = fileList.filter(file => ["png", "jpg", "jpeg", "webp", "gif", "svg", "mp3", "ogg", "wav", "mp4", "webm"].includes(file.extension));
      const executables = fileList.filter(file => ["exe", "bat", "cmd", "app"].includes(file.extension));
      const htmlEntries = fileList.filter(file => file.name.toLowerCase() === "index.html" || file.extension === "html");
      const jsonFiles = fileList.filter(file => file.extension === "json");

      let runMode = "external-attach";
      const warnings = [];
      if (htmlEntries.length) {
        runMode = "internal-html";
      } else if (executables.length) {
        runMode = "external-attach";
        warnings.push("Native executables cannot run inside the browser sandbox. Use External Attach Mode.");
      } else {
        runMode = "inspect-only";
        warnings.push("No browser-runnable entry point was detected. Blueprint inspection is still available.");
      }

      return {
        name: packageName,
        sourceType,
        runMode,
        entryCandidates: [...htmlEntries.map(file => file.path), ...executables.map(file => file.path)],
        detectedFolders: folders,
        detectedFiles: fileList,
        detectedScripts: scripts,
        detectedAssets: assets,
        detectedExecutables: executables,
        detectedJson: jsonFiles,
        warnings,
        importReport: {
          filesFound: fileList.length,
          foldersFound: folders.length,
          assetsFound: assets.length,
          scriptsFound: scripts.length,
          executablesFound: executables.length,
          generatedAt: now()
        }
      };
    }

    function createBlueprintFromPackage(pkg) {
      const nodes = [{
        id: "pkg-root",
        type: "package",
        source: "package",
        title: pkg.name || "Loaded Package",
        description: `Source: ${pkg.sourceType}. Run mode: ${pkg.runMode}.`,
        tags: ["package", pkg.sourceType, pkg.runMode].filter(Boolean)
      }];
      const edges = [];

      for (const folder of pkg.detectedFolders || []) {
        const id = `folder-${slug(folder)}`;
        nodes.push({ id, type: "folder", source: "package", title: folder, description: "Detected package folder.", tags: ["folder"] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "contains", source: "package" });
      }
      for (const file of pkg.detectedExecutables || []) {
        const id = `exe-${slug(file.path)}`;
        nodes.push({ id, type: "executable", source: "package", title: file.name, description: file.path, tags: ["executable"] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "entry candidate", source: "package" });
      }
      for (const file of pkg.detectedScripts || []) {
        const id = `script-${slug(file.path)}`;
        nodes.push({ id, type: "script", source: "package", title: file.name, description: file.path, tags: ["script", file.extension] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "script", source: "package" });
      }
      for (const file of (pkg.detectedAssets || []).slice(0, 40)) {
        const id = `asset-${slug(file.path)}`;
        nodes.push({ id, type: "asset", source: "package", title: file.name, description: file.path, tags: ["asset", file.extension] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "asset", source: "package" });
      }
      return { nodes, edges };
    }

    async function sha256File(file) {
      if (!crypto?.subtle) return `size-${file.size}-modified-${file.lastModified || 0}`;
      const buffer = await file.arrayBuffer();
      const digest = await crypto.subtle.digest("SHA-256", buffer);
      return Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, "0")).join("");
    }

    async function loadZip(file) {
      if (!file) return;
      if (!window.JSZip) {
        toast("JSZip did not load. Folder loading still works. Try again online or use Load Folder.");
        return;
      }
      try {
        const zip = await JSZip.loadAsync(await file.arrayBuffer());
        const files = Object.values(zip.files).filter(entry => !entry.dir).map(entry => ({
          name: entry.name.split("/").pop(),
          path: entry.name,
          size: entry._data?.uncompressedSize || 0,
          type: ""
        }));
        const pkg = inspectFiles(files, "zip", file.name.replace(/\.zip$/i, ""));
        const blueprint = createBlueprintFromPackage(pkg);
        let runtime = {
          status: "loaded",
          runMode: pkg.runMode,
          internalHtml: "",
          internalEntry: pkg.entryCandidates[0] || "",
          externalInstructions: pkg.warnings
        };
        if (pkg.runMode === "internal-html") {
          const entry = pkg.entryCandidates.find(candidate => candidate.toLowerCase().endsWith(".html"));
          const html = entry ? await zip.file(entry)?.async("string") : "";
          runtime = { ...runtime, internalHtml: html || "<p>No HTML entry could be loaded.</p>", internalEntry: entry || "" };
        }
        updateData(prev => ({
          ...prev,
          package: pkg,
          runtime,
          nodes: [...prev.nodes.filter(node => node.source !== "package"), ...blueprint.nodes],
          edges: [...prev.edges.filter(edge => edge.source !== "package"), ...blueprint.edges],
          timeline: [{
            id: uid("evt"), timestamp: now(), nodeId: prev.currentNodeId, type: "load",
            title: `Loaded package: ${pkg.name}`,
            summary: `Inspected ${pkg.importReport.filesFound} files and generated a hard blueprint.`,
            tags: ["load", "package", pkg.sourceType]
          }, ...prev.timeline]
        }));
        state.activeTab = "inspect";
        render();
      } catch (error) {
        console.error(error);
        toast("ZIP import failed. Check the file or use Load Folder.");
      }
    }

    async function loadFolder(files) {
      const list = Array.from(files || []);
      if (!list.length) return;
      const root = list[0].webkitRelativePath?.split("/")[0] || "Loaded Folder";
      const pkg = inspectFiles(list, "folder", root);
      const blueprint = createBlueprintFromPackage(pkg);
      updateData(prev => ({
        ...prev,
        package: pkg,
        runtime: {
          status: "loaded",
          runMode: pkg.runMode,
          internalHtml: "",
          internalEntry: pkg.entryCandidates[0] || "",
          externalInstructions: pkg.warnings
        },
        nodes: [...prev.nodes.filter(node => node.source !== "package"), ...blueprint.nodes],
        edges: [...prev.edges.filter(edge => edge.source !== "package"), ...blueprint.edges],
        timeline: [{
          id: uid("evt"), timestamp: now(), nodeId: prev.currentNodeId, type: "load",
          title: `Loaded folder: ${pkg.name}`,
          summary: `Inspected ${pkg.importReport.filesFound} files and generated a hard blueprint.`,
          tags: ["load", "folder"]
        }, ...prev.timeline]
      }));
      state.activeTab = "inspect";
      render();
    }

    function addFastNode(type = "location") {
      const titleInput = document.getElementById("newNodeTitle");
      const title = (titleInput?.value || "").trim() || `New ${type}`;
      const currentNode = getCurrentNode();
      const id = slug(`${type}-${title}-${Date.now()}`);
      const eventId = uid("evt");
      const node = {
        id, type, title,
        description: `Captured ${type} node from the current session.`,
        connections: currentNode ? [currentNode.id] : [],
        characters: [], items: [], events: [eventId], screenshots: [], notes: [], tags: [type], createdAt: now()
      };
      updateData(prev => ({
        ...prev,
        currentNodeId: id,
        nodes: [node, ...prev.nodes],
        edges: currentNode ? [{ id: uid("edge"), from: currentNode.id, to: id, label: "observed route" }, ...prev.edges] : prev.edges,
        timeline: [{ id: eventId, timestamp: now(), nodeId: id, type, title: `New ${type}: ${title}`, summary: "Created while mapping the loaded world.", tags: [type, "manual"] }, ...prev.timeline]
      }));
    }

    async function createGameCardFromSaveFile(file) {
      if (!file) return;
      try {
        const hash = await sha256File(file);
        const nowTime = now();
        const slotGuess = file.name.replace(/\.[^.]+$/, "").replace(/[^a-z0-9_-]+/gi, "-").toLowerCase() || "slot-imported";
        const card = {
          cardType: "GameCard", version: "0.1", id: uid("gamecard"),
          gameId: state.data.project?.id || "unknown-game",
          gameTitle: state.data.project?.title || "Unknown Game",
          slotId: slotGuess,
          slotTitle: file.name,
          createdAt: nowTime,
          updatedAt: nowTime,
          saveMode: "file-import-fingerprint",
          saveFile: {
            name: file.name,
            relativePath: file.name,
            hash,
            sizeBytes: file.size,
            lastModified: file.lastModified ? new Date(file.lastModified).toISOString() : nowTime
          },
          gameRuntime: {
            runMode: state.data.package?.runMode || "external-attach",
            executableName: state.data.package?.detectedExecutables?.[0]?.name || "unknown",
            packageId: state.data.project?.id || "unknown-package"
          }
        };
        updateData(prev => ({
          ...prev,
          memoryCards: {
            ...getMemoryCardsFor(prev),
            gameCards: [card, ...(prev.memoryCards?.gameCards || [])]
          },
          timeline: [{
            id: uid("evt"), timestamp: nowTime, nodeId: prev.currentNodeId, type: "load",
            title: `GameCard created: ${file.name}`,
            summary: "Imported save file fingerprint. This stores the mechanical save-state identity.",
            tags: ["GameCard", "save"]
          }, ...prev.timeline]
        }));
        state.activeTab = "cards";
        render();
      } catch (error) {
        console.error(error);
        toast("Could not create GameCard from that save file.");
      }
    }

    function getMemoryCardsFor(data) {
      return data.memoryCards || { gameCards: [], palCards: [], pairs: [], activePairId: "" };
    }

    function createPALCardFromCurrentNode() {
      const currentNode = getCurrentNode();
      if (!currentNode) return;
      const nowTime = now();
      const capturesForNode = state.data.captures.filter(capture => capture.nodeId === currentNode.id).map(capture => capture.id);
      const eventsForNode = state.data.timeline.filter(event => event.nodeId === currentNode.id).map(event => event.id);
      const card = {
        cardType: "PALCard", version: "0.1", id: uid("palcard"),
        gameId: state.data.project?.id || "unknown-game",
        title: `${currentNode.title} Palace Context`,
        palaceNodeId: currentNode.id,
        currentRoom: currentNode.title,
        createdAt: nowTime,
        updatedAt: nowTime,
        thumbnail: capturesForNode[0] || null,
        context: {
          summary: currentNode.description || `Palace context for ${currentNode.title}.`,
          route: buildRouteFromNode(state.data.nodes, currentNode.id),
          tags: currentNode.tags || [],
          notes: currentNode.notes || []
        },
        linkedAssets: { captures: capturesForNode, blueprints: ["world-blueprint-v0"], timelineEvents: eventsForNode },
        pairing: { gameCardId: null, gameSaveHash: null, pairStatus: "unpaired" }
      };
      updateData(prev => ({
        ...prev,
        memoryCards: { ...getMemoryCardsFor(prev), palCards: [card, ...(prev.memoryCards?.palCards || [])] },
        timeline: [{ id: uid("evt"), timestamp: nowTime, nodeId: currentNode.id, type: "note", title: `PALCard created: ${card.title}`, summary: "Created Palace Anchor Layer card from the current room.", tags: ["PALCard", "memory"] }, ...prev.timeline]
      }));
      state.activeTab = "cards";
      render();
    }

    function pairCards(gameCardId, palCardId) {
      const cards = getMemoryCards();
      const gameCard = cards.gameCards.find(card => card.id === gameCardId);
      const palCard = cards.palCards.find(card => card.id === palCardId);
      if (!gameCard || !palCard) return;
      const nowTime = now();
      const pairId = uid("pair");
      const updatedPalCard = {
        ...palCard,
        updatedAt: nowTime,
        pairing: { gameCardId, gameSaveHash: gameCard.saveFile?.hash || null, pairStatus: "synced" }
      };
      const status = getPairStatus(gameCard, updatedPalCard);
      const pair = { id: pairId, title: `${gameCard.slotTitle} + ${palCard.currentRoom}`, gameCardId, palCardId, status, createdAt: nowTime, updatedAt: nowTime };
      updateData(prev => ({
        ...prev,
        memoryCards: {
          ...getMemoryCardsFor(prev),
          activePairId: pairId,
          palCards: (prev.memoryCards?.palCards || []).map(card => card.id === palCardId ? updatedPalCard : card),
          pairs: [pair, ...(prev.memoryCards?.pairs || [])]
        },
        timeline: [{ id: uid("evt"), timestamp: nowTime, nodeId: palCard.palaceNodeId, type: "note", title: "MEM Save Pair created", summary: `${gameCard.slotTitle} paired with ${palCard.currentRoom}.`, tags: ["MEM Save Pair", "GameCard", "PALCard"] }, ...prev.timeline]
      }));
    }

    function autoPairLatestCards() {
      const cards = getMemoryCards();
      const gameCard = cards.gameCards?.[0];
      const palCard = cards.palCards?.[0];
      if (!gameCard || !palCard) return toast("Create one GameCard and one PALCard first.");
      pairCards(gameCard.id, palCard.id);
    }

    function loadPair(pairId) {
      const pair = getPairViews().find(item => item.id === pairId);
      if (!pair?.palCard?.palaceNodeId) return;
      updateData(prev => ({
        ...prev,
        currentNodeId: pair.palCard.palaceNodeId,
        memoryCards: { ...getMemoryCardsFor(prev), activePairId: pair.id },
        timeline: [{ id: uid("evt"), timestamp: now(), nodeId: pair.palCard.palaceNodeId, type: "load", title: "MEM Save Pair loaded", summary: `Restored palace context for ${pair.palCard.currentRoom}.`, tags: ["MEM Save Pair", "load"] }, ...prev.timeline]
      }));
      state.activeTab = "blueprint";
      render();
    }

    function duplicatePair(pairId) {
      const pair = getPairViews().find(item => item.id === pairId);
      if (!pair) return;
      const nowTime = now();
      const cleanPair = { id: uid("pair"), title: `${pair.title} Copy`, gameCardId: pair.gameCardId, palCardId: pair.palCardId, status: pair.status, createdAt: nowTime, updatedAt: nowTime };
      updateData(prev => ({ ...prev, memoryCards: { ...getMemoryCardsFor(prev), pairs: [cleanPair, ...(prev.memoryCards?.pairs || [])] } }));
    }

    function unpairCards(pairId) {
      updateData(prev => ({
        ...prev,
        memoryCards: {
          ...getMemoryCardsFor(prev),
          pairs: (prev.memoryCards?.pairs || []).filter(pair => pair.id !== pairId),
          activePairId: prev.memoryCards?.activePairId === pairId ? "" : prev.memoryCards?.activePairId || ""
        }
      }));
    }

    function exportPair(pairId) {
      const pair = getPairViews().find(item => item.id === pairId);
      if (!pair) return;
      const manifest = {
        memSaveVersion: "0.1",
        savePairId: pair.id,
        title: pair.title,
        createdAt: pair.createdAt,
        updatedAt: now(),
        gameCard: pair.gameCard,
        palCard: pair.palCard,
        pairing: { status: pair.status, gameSaveHash: pair.gameCard?.saveFile?.hash || null, palaceNodeId: pair.palCard?.palaceNodeId || null },
        palaceProject: state.data
      };
      downloadText(`${slug(pair.title) || "mem-save-pair"}.memsave.json`, JSON.stringify(manifest, null, 2), "application/json");
    }

    function exportAllPairs() {
      const manifest = { memSaveVersion: "0.1", title: `${state.data.project.title} MEM Save Pairs`, exportedAt: now(), memoryCards: getMemoryCards(), palaceProject: state.data };
      downloadText(`${state.data.project.id || "mem-palace"}-memsave.json`, JSON.stringify(manifest, null, 2), "application/json");
    }

    function verifyPairs() {
      updateData(prev => {
        const cards = getMemoryCardsFor(prev);
        const pairs = (cards.pairs || []).map(pair => {
          const gameCard = cards.gameCards.find(card => card.id === pair.gameCardId);
          const palCard = cards.palCards.find(card => card.id === pair.palCardId);
          return { ...pair, status: getPairStatus(gameCard, palCard), updatedAt: now() };
        });
        return { ...prev, memoryCards: { ...cards, pairs } };
      });
    }

    function buildProgressionDrawer(titleOverride = "") {
      const cards = getMemoryCards();
      const pairViews = getPairViews();
      const activePair = pairViews.find(pair => pair.id === cards.activePairId) || pairViews[0] || null;
      const currentNode = getCurrentNode();
      const lastCapture = state.data.captures?.[0] || null;
      const lastEvent = state.data.timeline?.[0] || null;
      const drawerId = uid("drawer");
      const drawerTitle = titleOverride.trim() || `${state.data.package?.name && state.data.package.name !== "No package loaded" ? state.data.package.name : state.data.project.title} - ${currentNode?.title || "Current Room"}`;
      return {
        drawerId,
        title: drawerTitle,
        type: "progression-drawer",
        status: activePair ? activePair.status : "legacy",
        createdAt: now(),
        updatedAt: now(),
        packageId: state.data.project?.id || "unknown-package",
        packageName: state.data.package?.name || state.data.project.title,
        runtimeMode: state.data.runtime?.runMode || "none",
        activeTab: state.activeTab,
        currentNodeId: state.data.currentNodeId,
        currentRoom: currentNode?.title || "Unknown Room",
        activePairId: activePair?.id || cards.activePairId || "",
        gameCardId: activePair?.gameCardId || "",
        palCardId: activePair?.palCardId || "",
        lastCaptureId: lastCapture?.id || "",
        timelineCursor: lastEvent?.id || "",
        layout: { leftPanel: state.data.runtime?.runMode === "internal-html" ? "internal-html" : "capture", rightPanel: "blueprint", sidePanel: "memoryCards" },
        summary: `Resume ${currentNode?.title || "the current room"} with package, palace, card, and timeline context.`
      };
    }

    function createProgressionDrawer(titleOverride = "") {
      const drawer = buildProgressionDrawer(titleOverride);
      updateData(prev => ({
        ...prev,
        progressionDrawers: { ...getDrawersFor(prev), activeDrawerId: drawer.drawerId, drawers: [drawer, ...(prev.progressionDrawers?.drawers || [])] },
        timeline: [{ id: uid("evt"), timestamp: now(), nodeId: prev.currentNodeId, type: "checkpoint", title: "Progression Drawer created", summary: `${drawer.title} saved as a resumable MEM Palace session drawer.`, tags: ["drawer", "progression-history"] }, ...prev.timeline]
      }));
      state.activeTab = "history";
      render();
    }

    function getDrawersFor(data) {
      return data.progressionDrawers || { drawers: [], activeDrawerId: "", pinnedDrawerIds: [] };
    }

    function saveFullSession() {
      const drawer = buildProgressionDrawer();
      const existing = getDrawers();
      const nextProgressionDrawers = { ...existing, activeDrawerId: drawer.drawerId, drawers: [drawer, ...(existing.drawers || [])] };
      const nextData = {
        ...state.data,
        progressionDrawers: nextProgressionDrawers,
        timeline: [{ id: uid("evt"), timestamp: now(), nodeId: state.data.currentNodeId, type: "checkpoint", title: "Full Session saved", summary: `${drawer.title} saved as a full MEM Palace session.`, tags: ["drawer", "full-session", "progression-history"] }, ...state.data.timeline],
        project: { ...state.data.project, updatedAt: now() }
      };
      state.data = normaliseData(nextData);
      persist();
      const payload = {
        sessionVersion: "0.1",
        exportedAt: now(),
        project: state.data.project,
        package: state.data.package,
        runtime: state.data.runtime,
        currentNode: getCurrentNode(),
        memoryCards: state.data.memoryCards,
        progressionDrawers: nextProgressionDrawers,
        activeDrawer: drawer,
        palaceSnapshot: state.data,
        browserBetaNote: "This browser beta saves MEM Palace context, memory cards, progression drawers, captures, notes, and blueprint state. It does not freeze a native game process."
      };
      downloadText(`${slug(state.data.project.title)}-full-session.memsession.json`, JSON.stringify(payload, null, 2), "application/json");
      state.activeTab = "history";
      render();
    }

    function resumeDrawer(drawerId) {
      const drawer = getDrawers().drawers.find(item => item.drawerId === drawerId);
      if (!drawer) return;
      updateData(prev => ({
        ...prev,
        currentNodeId: drawer.currentNodeId || prev.currentNodeId,
        memoryCards: { ...getMemoryCardsFor(prev), activePairId: drawer.activePairId || prev.memoryCards?.activePairId || "" },
        progressionDrawers: {
          ...getDrawersFor(prev),
          activeDrawerId: drawer.drawerId,
          drawers: (prev.progressionDrawers?.drawers || []).map(item => item.drawerId === drawer.drawerId ? { ...item, updatedAt: now() } : item)
        },
        timeline: [{ id: uid("evt"), timestamp: now(), nodeId: drawer.currentNodeId || prev.currentNodeId, type: "load", title: "Progression Drawer resumed", summary: `Restored workspace drawer: ${drawer.title}.`, tags: ["drawer", "resume"] }, ...prev.timeline]
      }));
      state.activeTab = drawer.activeTab && drawer.activeTab !== "history" ? drawer.activeTab : "palace";
      render();
    }

    function exportDrawer(drawerId) {
      const drawer = getDrawers().drawers.find(item => item.drawerId === drawerId);
      if (!drawer) return;
      const payload = { drawerVersion: "0.1", exportedAt: now(), drawer, linkedPair: getPairViews().find(pair => pair.id === drawer.activePairId) || null, palaceSnapshot: state.data, browserBetaNote: "Browser Beta restores session context and save identity. Desktop Edition can relaunch/copy saves and reattach native runtimes." };
      downloadText(`${slug(drawer.title)}.memdrawer.json`, JSON.stringify(payload, null, 2), "application/json");
    }

    function exportActiveDrawer() {
      const drawers = getDrawers();
      if (!drawers.activeDrawerId) return toast("No active drawer yet.");
      exportDrawer(drawers.activeDrawerId);
    }

    function deleteDrawer(drawerId) {
      updateData(prev => ({
        ...prev,
        progressionDrawers: {
          ...getDrawersFor(prev),
          drawers: (prev.progressionDrawers?.drawers || []).filter(drawer => drawer.drawerId !== drawerId),
          pinnedDrawerIds: (prev.progressionDrawers?.pinnedDrawerIds || []).filter(id => id !== drawerId),
          activeDrawerId: prev.progressionDrawers?.activeDrawerId === drawerId ? "" : prev.progressionDrawers?.activeDrawerId || ""
        }
      }));
    }

    function togglePinDrawer(drawerId) {
      updateData(prev => {
        const drawers = getDrawersFor(prev);
        const existing = drawers.pinnedDrawerIds || [];
        const pinnedDrawerIds = existing.includes(drawerId) ? existing.filter(id => id !== drawerId) : [drawerId, ...existing];
        return { ...prev, progressionDrawers: { ...drawers, pinnedDrawerIds } };
      });
    }

    function exportAllDrawers() {
      const payload = { drawerArchiveVersion: "0.1", title: `${state.data.project.title} Progression Drawers`, exportedAt: now(), progressionDrawers: getDrawers(), project: state.data.project, palaceSnapshot: state.data };
      downloadText(`${slug(state.data.project.title)}-drawers.memdrawer.json`, JSON.stringify(payload, null, 2), "application/json");
    }

    function importMemSave(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          if (parsed.sessionVersion && parsed.palaceSnapshot?.nodes) {
            state.data = normaliseData(parsed.palaceSnapshot);
            persist();
            state.activeTab = "history";
            render();
            toast("Full MEM session imported.");
            return;
          }
          if (parsed.drawerArchiveVersion && parsed.progressionDrawers) {
            updateData(prev => ({ ...prev, progressionDrawers: parsed.progressionDrawers }));
            state.activeTab = "history";
            render();
            toast("Drawer archive imported.");
            return;
          }
          if (parsed.drawerVersion && parsed.drawer) {
            updateData(prev => ({
              ...prev,
              progressionDrawers: { ...getDrawersFor(prev), activeDrawerId: parsed.drawer.drawerId, drawers: [parsed.drawer, ...(prev.progressionDrawers?.drawers || [])] }
            }));
            state.activeTab = "history";
            render();
            toast("Drawer imported.");
            return;
          }
          if (parsed.palaceProject?.nodes) {
            state.data = normaliseData(parsed.palaceProject);
            persist();
          } else if (parsed.memoryCards) {
            updateData(prev => ({ ...prev, memoryCards: parsed.memoryCards }));
          }
          state.activeTab = "cards";
          render();
          toast("MEM file imported.");
        } catch (error) {
          console.error(error);
          toast("Could not import MEM file. The file format is not valid JSON.");
        }
      };
      reader.readAsText(file);
    }

    async function startCapture() {
      if (!navigator.mediaDevices?.getDisplayMedia) {
        toast("Screen capture is not available in this browser.");
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
        state.captureStream = stream;
        const video = document.getElementById("captureVideo");
        if (video) video.srcObject = stream;
        const [track] = stream.getVideoTracks();
        if (track) {
          track.onended = () => {
            state.captureStream = null;
            const currentVideo = document.getElementById("captureVideo");
            if (currentVideo) currentVideo.srcObject = null;
          };
        }
      } catch (error) {
        console.error(error);
        toast("Screen capture was cancelled or blocked.");
      }
    }

    function stopCapture() {
      if (state.captureStream) state.captureStream.getTracks().forEach(track => track.stop());
      state.captureStream = null;
      const video = document.getElementById("captureVideo");
      if (video) video.srcObject = null;
    }

    function captureMoment() {
      const video = document.getElementById("captureVideo");
      if (!video || !video.videoWidth) {
        toast("Start screen capture first, then capture the moment.");
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        toast("Canvas context could not be created.");
        return;
      }
      ctx.drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL("image/webp", 0.82);
      const currentNode = getCurrentNode();
      const captureId = uid("cap");
      const eventId = uid("evt");
      updateData(prev => ({
        ...prev,
        captures: [{ id: captureId, nodeId: prev.currentNodeId, screenshot: dataUrl, createdAt: now(), title: `Capture at ${currentNode?.title || "current room"}` }, ...prev.captures],
        nodes: prev.nodes.map(node => node.id === prev.currentNodeId ? { ...node, screenshots: [captureId, ...(node.screenshots || [])] } : node),
        timeline: [{ id: eventId, timestamp: now(), nodeId: prev.currentNodeId, type: "capture", title: "Captured moment", summary: `Screenshot attached to ${currentNode?.title || "current room"}.`, tags: ["capture"] }, ...prev.timeline]
      }));
    }

    function addNote() {
      const input = document.getElementById("noteText");
      const note = (input?.value || "").trim();
      if (!note) return;
      updateData(prev => ({
        ...prev,
        nodes: prev.nodes.map(node => node.id === prev.currentNodeId ? { ...node, notes: [note, ...(node.notes || [])] } : node),
        timeline: [{ id: uid("evt"), timestamp: now(), nodeId: prev.currentNodeId, type: "note", title: "Manual note", summary: note, tags: ["note"] }, ...prev.timeline]
      }));
    }

      downloadText(`${slug(state.data.project.title)}.mempalace.json`, JSON.stringify(state.data, null, 2), "application/json");

      return `<nav class="tabs">${tabs.map(([id, icon, label]) => `<button class="tab ${state.activeTab === id ? "active" : ""}" data-tab="${id}">${icon} ${escapeHtml(label)}</button>`).join("")}</nav>`;
    }

    function renderAside() {
      const data = state.data;
      const cards = getMemoryCards();
      const drawers = getDrawers();
      const currentNode = getCurrentNode();
      return `
        <aside class="aside">
          <section class="card space">
            <h2>Project Stats</h2>
            <div class="stats">
              ${stat("Nodes", data.nodes.length)}
              ${stat("Events", data.timeline.length)}
              ${stat("Captures", data.captures.length)}
              ${stat("GameCards", cards.gameCards?.length || 0)}
              ${stat("PALCards", cards.palCards?.length || 0)}
              ${stat("Pairs", cards.pairs?.length || 0)}
              ${stat("Drawers", drawers.drawers?.length || 0)}
            </div>
          </section>

          <section class="card space">
            <h2>Current Room</h2>
            <div>
              <b style="color: var(--accent2);">${escapeHtml(currentNode?.title || "None")}</b>
              <p class="small muted" style="margin-top: 6px;">${escapeHtml(currentNode?.type || "none")}</p>
            </div>
            <div class="row">${(currentNode?.tags || []).map(tag => pill(tag)).join("")}</div>
            ${button("📦 Save Drawer", "save-drawer", "ghost full")}
            ${button("⬇️ Export Active Drawer", "export-active-drawer", "ghost full")}
            ${button("⬇️ Save Full Session", "save-full-session", "solid full")}
            ${button("🧹 Reset Local Project", "reset-project", "ghost full")}
          </section>
        </aside>
      `;
    }

    function stat(label, value) {
      return `<div class="stat"><div class="faint small">${escapeHtml(label)}</div><b>${escapeHtml(value)}</b></div>`;
    }

    function renderMain() {
      const tab = state.activeTab;
      if (tab === "load") return renderLoad();
      if (tab === "inspect") return renderInspect();
      if (tab === "play") return renderPlay();
      if (tab === "cards") return renderCards();
      if (tab === "history") return renderHistory();
      if (tab === "palace") return renderPalace();
      if (tab === "blueprint") return renderBlueprint();
      if (tab === "timeline") return renderTimeline();
      if (tab === "notes") return renderNotes();
      return renderBuild();
    }

    function renderLoad() {
      return `
        <div class="grid-3">
          <section class="card space">
            <h2>Load ZIP</h2>
            <p class="small muted">Inspect a ZIP package and auto-build the first hard blueprint.</p>
            ${button("🗄️ Load ZIP", "click-zip", "solid")}
            <input id="zipInput" class="hidden" type="file" accept=".zip" />
          </section>
          <section class="card space">
            <h2>Load Folder</h2>
            <p class="small muted">Use browser folder permission to inspect local project/game files.</p>
            ${button("📂 Load Folder", "click-folder", "solid")}
            <input id="folderInput" class="hidden" type="file" webkitdirectory directory multiple />
          </section>
          <section class="card space">
            <h2>Import MEM File</h2>
            <p class="small muted">Reload a .memsave.json pair, .memdrawer.json drawer, drawer archive, project snapshot, or .memsession.json.</p>
            ${button("📄 Import MEM File", "click-mem", "solid")}
            <input id="memInput" class="hidden" type="file" accept=".json,.memsave,.memdrawer,.memsession" />
          </section>
        </div>
      `;
    }

    function renderInspect() {
      const pkg = state.data.package;
      return `
        <div class="stack">
          <section class="card between">
            <div><h3>Package Inspector</h3><p class="muted">${escapeHtml(pkg.name)}</p></div>
            ${pill(pkg.runMode || "none", pkg.runMode === "internal-html" ? "green" : "blue")}
          </section>
          <div class="grid-4">
            ${stat("Files", pkg.importReport?.filesFound || 0)}
            ${stat("Folders", pkg.importReport?.foldersFound || 0)}
            ${stat("Scripts", pkg.importReport?.scriptsFound || 0)}
            ${stat("Assets", pkg.importReport?.assetsFound || 0)}
          </div>
          <section class="card space">
            <h2>Detected entries</h2>
            <div class="space">${(pkg.entryCandidates || []).map(entry => `<div class="item mono small">${escapeHtml(entry)}</div>`).join("") || `<p class="small muted">No entry candidates detected.</p>`}</div>
          </section>
          ${(pkg.warnings || []).length ? `<section class="card space"><h2>Warnings</h2><ul>${pkg.warnings.map(w => `<li class="small muted">${escapeHtml(w)}</li>`).join("")}</ul></section>` : ""}
        </div>
      `;
    }

    function renderPlay() {
      const runtime = state.data.runtime;
      const internal = runtime.runMode === "internal-html" && runtime.internalHtml;
      return `
        <div class="grid-2">
          <section class="card space">
            <div class="between">
              <h2>Play / Attach View</h2>
              <div class="row">
                ${button("📷 Attach Capture", "start-capture", "ghost")}
                ${button("Stop Capture", "stop-capture", "ghost")}
                ${button("➕ Capture Moment", "capture-moment", "solid")}
              </div>
            </div>
            ${internal ? `<iframe class="viewer" title="Internal HTML Game" sandbox="allow-scripts allow-same-origin" srcdoc="${escapeHtml(runtime.internalHtml)}"></iframe>` : `<video id="captureVideo" class="viewer" autoplay muted playsinline></video>`}
          </section>
          <section class="card space">
            <h2>Runtime Mode</h2>
            <div>${pill(runtime.runMode || "none", runtime.runMode === "internal-html" ? "green" : "blue")}</div>
            <p class="small muted">Native PC games belong in External Attach Mode. Run the game normally, then attach screen/window capture.</p>
            <p class="small faint">Internal HTML preview supports simple/self-contained HTML. ZIP asset rewriting can be added later.</p>
            <h2>Latest Captures</h2>
            <div class="space">${state.data.captures.slice(0, 3).map(c => `<div class="item"><img class="capture-thumb" src="${c.screenshot}" alt="${escapeHtml(c.title)}"><p class="tiny muted" style="margin-top:8px;">${escapeHtml(c.title)} · ${escapeHtml(c.createdAt)}</p></div>`).join("") || `<p class="small muted">No captures yet.</p>`}</div>
          </section>
        </div>
      `;
    }

    function renderCards() {
      const cards = getMemoryCards();
      const pairViews = getPairViews();
      return `
        <div class="stack">
          <section class="card between">
            <div>
              <h3>Memory Card Bay</h3>
              <p class="small muted" style="margin-top:8px;">GameCard stores the mechanical save identity/hash. PALCard stores the palace context. Together they form the MEM Save Pair.</p>
              <p class="tiny faint" style="margin-top:8px;">Browser Beta: save-file fingerprinting only. Desktop Edition: actual save restore/copy support.</p>
            </div>
            <div class="logo">💳</div>
          </section>

          <div class="grid-2">
            <section class="card space"><h2>Create GameCard</h2><p class="small muted">Import a game save file. The terminal fingerprints it with SHA-256 where available.</p>${button("⬆️ Import Save File", "click-save", "solid")}<input id="saveInput" class="hidden" type="file" /></section>
            <section class="card space"><h2>Create PALCard</h2><p class="small muted">Create a Palace Anchor Layer card from the current room, notes, captures, and timeline context.</p>${button("➕ Create From Current Node", "create-pal", "solid")}</section>
          </div>

          <div class="grid-2">
            <section class="card space"><h2>GameCards</h2>${cards.gameCards?.map(card => `<div class="item"><div class="between"><b>${escapeHtml(card.slotTitle)}</b>${pill("GameCard", "blue")}</div><p class="tiny muted" style="margin-top:6px;">${escapeHtml(card.saveFile.name)} · ${Number(card.saveFile.sizeBytes || 0).toLocaleString()} bytes</p><p class="tiny mono faint truncate" style="margin-top:6px;">${escapeHtml(card.saveFile.hash)}</p></div>`).join("") || `<p class="small muted">No GameCards yet.</p>`}</section>
            <section class="card space"><h2>PALCards</h2>${cards.palCards?.map(card => `<div class="item"><div class="between"><b>${escapeHtml(card.title)}</b>${pill("PALCard")}</div><p class="tiny muted" style="margin-top:6px;">Room: ${escapeHtml(card.currentRoom)}</p><p class="tiny muted" style="margin-top:6px;">Pair status: ${escapeHtml(card.pairing?.pairStatus || "unpaired")}</p></div>`).join("") || `<p class="small muted">No PALCards yet.</p>`}</section>
          </div>

          <section class="card space">
            <div class="between"><div><h2>Create MEM Save Pair</h2><p class="small muted">Choose one mechanical save card and one palace context card.</p></div>${button("Auto-pair latest", "auto-pair", "ghost")}</div>
            <div class="grid-3">
              <label class="field"><span class="small muted">GameCard</span><select id="gameCardSelect" class="select"><option value="">Choose GameCard</option>${(cards.gameCards || []).map(card => `<option value="${escapeHtml(card.id)}">${escapeHtml(card.slotTitle)}</option>`).join("")}</select></label>
              <label class="field"><span class="small muted">PALCard</span><select id="palCardSelect" class="select"><option value="">Choose PALCard</option>${(cards.palCards || []).map(card => `<option value="${escapeHtml(card.id)}">${escapeHtml(card.title)}</option>`).join("")}</select></label>
              <div style="align-self:end;">${button("Pair Cards", "pair-selected", "solid full")}</div>
            </div>
          </section>

          <section class="card space">
            <div class="between"><div><h2>MEM Save Pairs</h2><p class="small muted">[GameCard] + [PALCard] = full restoration key.</p></div><div class="row">${button("Verify Pairs", "verify-pairs", "ghost")}${button("⬇️ Export All", "export-pairs", "ghost")}</div></div>
            ${pairViews.map(pair => `<div class="item"><div class="between"><div><div class="row"><b>${escapeHtml(pair.title)}</b>${pill(pair.status, statusTone(pair.status))}</div><p class="tiny muted" style="margin-top:6px;">Game: ${escapeHtml(pair.gameCard?.slotTitle || "missing")} · PAL: ${escapeHtml(pair.palCard?.currentRoom || "missing")}</p></div><div class="row">${button("Load Pair", `load-pair:${pair.id}`, "ghost")}${button("Duplicate", `duplicate-pair:${pair.id}`, "ghost")}${button("Export", `export-pair:${pair.id}`, "ghost")}${button("Unpair", `unpair:${pair.id}`, "ghost")}</div></div></div>`).join("") || `<p class="small muted">No paired cards yet.</p>`}
          </section>
        </div>
      `;
    }

    function renderHistory() {
      const drawers = getDrawers();
      const pairViews = getPairViews();
      const pinned = drawers.pinnedDrawerIds || [];
      const sortedDrawers = [...(drawers.drawers || [])].sort((a, b) => {
        const aPinned = pinned.includes(a.drawerId) ? 1 : 0;
        const bPinned = pinned.includes(b.drawerId) ? 1 : 0;
        if (aPinned !== bPinned) return bPinned - aPinned;
        return String(b.updatedAt || b.createdAt).localeCompare(String(a.updatedAt || a.createdAt));
      });
      return `
        <div class="stack">
          <section class="card between"><div><h3>Progression History Drawers</h3><p class="small muted" style="margin-top:8px;">MEM Palace remembers the loaded world, current room, active cards, captures, notes, route, runtime mode, and workspace layout.</p><p class="tiny faint" style="margin-top:8px;">GameCard = where the game is. PALCard = what the player knows. Drawer = how the workspace was left.</p></div><div class="logo">🗄️</div></section>
          <div class="grid-3">${stat("Drawers", drawers.drawers?.length || 0)}${stat("Pinned", drawers.pinnedDrawerIds?.length || 0)}<div class="stat"><div class="faint small">Active Drawer</div><p class="truncate" style="margin-top:10px; font-weight:800; color:var(--accent2);">${escapeHtml(drawers.activeDrawerId || "none")}</p></div></div>
          <section class="card between"><div><h2>Create Drawer Checkpoint</h2><p class="small muted" style="margin-top:6px;">Freeze the current workspace arrangement: package, room, active MEM pair, timeline cursor, runtime mode, and layout.</p></div><div class="row">${button("➕ Save Current Drawer", "save-drawer", "solid")}${button("⬇️ Export Drawers", "export-drawers", "ghost")}</div></section>
          <div class="space">
            ${sortedDrawers.map(drawer => {
              const pair = pairViews.find(item => item.id === drawer.activePairId);
              const isPinned = pinned.includes(drawer.drawerId);
              return `<section class="card ${drawer.drawerId === drawers.activeDrawerId ? "" : ""}" style="border-color:${drawer.drawerId === drawers.activeDrawerId ? "var(--border-strong)" : "var(--border)"}"><div class="between"><div class="space"><div class="row"><h2>${escapeHtml(drawer.title)}</h2>${pill(drawer.status, statusTone(drawer.status))}${isPinned ? pill("pinned", "purple") : ""}</div><p class="small muted">Room: ${escapeHtml(drawer.currentRoom)} · Runtime: ${escapeHtml(drawer.runtimeMode)} · Tab: ${escapeHtml(drawer.activeTab)}</p><p class="tiny faint">Package: ${escapeHtml(drawer.packageName)} · Pair: ${escapeHtml(pair?.title || drawer.activePairId || "none")}</p><p class="tiny faint">Updated: ${escapeHtml(drawer.updatedAt || drawer.createdAt)}</p></div><div class="row">${button("Resume Drawer", `resume-drawer:${drawer.drawerId}`, "ghost")}${button(isPinned ? "Unpin" : "Pin", `pin-drawer:${drawer.drawerId}`, "ghost")}${button("Export", `export-drawer:${drawer.drawerId}`, "ghost")}${button("Delete", `delete-drawer:${drawer.drawerId}`, "ghost")}</div></div></section>`;
            }).join("") || `<section class="card"><p class="small muted">No drawers yet. Save a checkpoint when the workspace reaches a meaningful point.</p></section>`}
          </div>
        </div>
      `;
    }

    function renderPalace() {
      const currentNode = getCurrentNode();
      return `
        <div class="grid-2">
          <section class="card space"><h2>Palace Rooms</h2><div class="space">${state.data.nodes.map(node => `<button class="item room-button ${node.id === currentNode?.id ? "active" : ""}" data-action="select-node:${node.id}"><div class="between"><b>${escapeHtml(node.title)}</b>${pill(node.type)}</div><p class="small muted" style="margin-top:8px;">${escapeHtml(node.description || "")}</p></button>`).join("")}</div></section>
          <section class="card space"><h2>Current Room</h2><h3>${escapeHtml(currentNode?.title || "No room")}</h3><p class="muted">${escapeHtml(currentNode?.description || "")}</p><div class="row">${(currentNode?.tags || []).map(tag => pill(tag)).join("")}</div><div class="row"><input id="newNodeTitle" class="input" style="flex:1; min-width:180px;" placeholder="New node title" /><button class="btn solid" data-action="add-node:location">New Location</button><button class="btn ghost" data-action="add-node:battle">New Battle</button></div></section>
        </div>
      `;
    }

    function renderBlueprint() {
      return `
        <div class="stack">
          <section class="card space"><h2>Blueprint Graph</h2><div class="grid-3">${state.data.nodes.slice(0, 60).map(node => `<div class="item"><div class="between"><b>${escapeHtml(node.title)}</b>${pill(node.type, node.type === "package" ? "purple" : "")}</div><p class="tiny faint" style="margin-top:8px;">${(node.connections || []).length} connections</p></div>`).join("")}</div></section>
          <section class="card space"><h2>Edges</h2>${state.data.edges.map(edge => `<div class="item mono tiny">${escapeHtml(edge.from)} → ${escapeHtml(edge.to)} · ${escapeHtml(edge.label)}</div>`).join("") || `<p class="small muted">No edges yet.</p>`}</section>
        </div>
      `;
    }

    function renderTimeline() {
      return `<div class="space">${state.data.timeline.map(event => `<section class="card"><div class="between"><b>${escapeHtml(event.title)}</b>${pill(event.type, "blue")}</div><p class="small muted" style="margin-top:8px;">${escapeHtml(event.summary)}</p><p class="tiny faint" style="margin-top:10px;">${escapeHtml(event.timestamp)} · ${escapeHtml(event.nodeId)}</p></section>`).join("")}</div>`;
    }

    function renderNotes() {
      const currentNode = getCurrentNode();
      return `
        <div class="grid-2">
          <section class="card space"><h2>Add Note to ${escapeHtml(currentNode?.title || "current room")}</h2><textarea id="noteText" class="textarea" placeholder="What did the player learn here?"></textarea>${button("Save Note", "add-note", "solid")}</section>
          <section class="card space"><h2>Room Notes</h2>${(currentNode?.notes || []).map(note => `<div class="item small">${escapeHtml(note)}</div>`).join("") || `<p class="small muted">No notes for this room yet.</p>`}</section>
        </div>
      `;
    }

    function renderBuild() {
      return `
        <div class="grid-3">
          <section class="card space"><h2>Export Project JSON</h2>${button("⬇️ Export JSON", "export-project", "solid")}</section>
          <section class="card space"><h2>Export HTML Guide</h2>${button("⬇️ Export HTML", "export-html", "solid")}</section>
          <section class="card space"><h2>Export MEM Save Pairs</h2>${button("⬇️ Export Pairs", "export-pairs", "solid")}</section>
          <section class="card space"><h2>Export Drawers</h2>${button("⬇️ Export Drawers", "export-drawers", "ghost")}</section>
          <section class="card space"><h2>Save Full Session</h2>${button("⬇️ Save Full Session", "save-full-session", "solid")}</section>
          <section class="card space"><h2>Import MEM File</h2>${button("📄 Import MEM File", "click-mem", "ghost")}<input id="memInput" class="hidden" type="file" accept=".json,.memsave,.memdrawer,.memsession" /></section>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      app.innerHTML = `
        ${renderHeader()}
        ${renderTabs()}
        <div class="layout">
          ${renderAside()}
          <main>${renderMain()}</main>
        </div>
      `;
      wireEvents();
      if (state.activeTab === "play" && state.captureStream) {
        const video = document.getElementById("captureVideo");
        if (video) video.srcObject = state.captureStream;
      }
    }

    function wireEvents() {
      document.querySelectorAll("[data-tab]").forEach(button => {
        button.addEventListener("click", () => setTab(button.dataset.tab));
      });
      document.querySelectorAll("[data-action]").forEach(button => {
        button.addEventListener("click", () => handleAction(button.dataset.action));
      });
      const zipInput = document.getElementById("zipInput");
      if (zipInput) zipInput.addEventListener("change", event => loadZip(event.target.files?.[0]));
      const folderInput = document.getElementById("folderInput");
      if (folderInput) folderInput.addEventListener("change", event => loadFolder(event.target.files));
      const memInput = document.getElementById("memInput");
      if (memInput) memInput.addEventListener("change", event => importMemSave(event.target.files?.[0]));
      const saveInput = document.getElementById("saveInput");
      if (saveInput) saveInput.addEventListener("change", event => createGameCardFromSaveFile(event.target.files?.[0]));
    }

    function handleAction(action) {
      if (!action) return;
      const [name, id] = action.split(":");
      if (name === "click-zip") return document.getElementById("zipInput")?.click();
      if (name === "click-folder") return document.getElementById("folderInput")?.click();
      if (name === "click-mem") return document.getElementById("memInput")?.click();
      if (name === "click-save") return document.getElementById("saveInput")?.click();
      if (name === "save-drawer") return createProgressionDrawer();
      if (name === "export-active-drawer") return exportActiveDrawer();
      if (name === "save-full-session") return saveFullSession();
      if (name === "reset-project") return resetProject();
      if (name === "start-capture") return startCapture();
      if (name === "stop-capture") return stopCapture();
      if (name === "capture-moment") return captureMoment();
      if (name === "create-pal") return createPALCardFromCurrentNode();
      if (name === "auto-pair") return autoPairLatestCards();
      if (name === "pair-selected") {
        const gameCardId = document.getElementById("gameCardSelect")?.value;
        const palCardId = document.getElementById("palCardSelect")?.value;
        if (!gameCardId || !palCardId) return toast("Choose one GameCard and one PALCard.");
        return pairCards(gameCardId, palCardId);
      }
      if (name === "verify-pairs") return verifyPairs();
      if (name === "export-pairs") return exportAllPairs();
      if (name === "load-pair") return loadPair(id);
      if (name === "duplicate-pair") return duplicatePair(id);
      if (name === "export-pair") return exportPair(id);
      if (name === "unpair") return unpairCards(id);
      if (name === "resume-drawer") return resumeDrawer(id);
      if (name === "pin-drawer") return togglePinDrawer(id);
      if (name === "export-drawer") return exportDrawer(id);
      if (name === "delete-drawer") return deleteDrawer(id);
      if (name === "export-drawers") return exportAllDrawers();
      if (name === "select-node") return updateData(prev => ({ ...prev, currentNodeId: id }));
      if (name === "add-node") return addFastNode(id || "location");
      if (name === "add-note") return addNote();
      if (name === "export-project") return exportProjectJson();
      if (name === "export-html") return exportHtmlGuide();
    }

    window.addEventListener("error", event => {
      console.error(event.error || event.message);
      toast(`Runtime error: ${event.message}`);
    });

    window.addEventListener("unhandledrejection", event => {
      console.error(event.reason);
      toast("Unhandled runtime promise rejection. Check console for details.");
    });

    render();
  </script>
</body>
</html>
