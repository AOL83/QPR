<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Aurora One v0.1 - Runnable Browser Console</title>
  <style>
    :root{
      --bg:#03060c; --panel:rgba(9,15,28,.76); --panel2:rgba(0,0,0,.45);
      --gold:#d4af37; --green:#4ade80; --cyan:#60a5fa; --red:#ef4444;
      --text:#eef2ff; --muted:#94a3b8; --line:rgba(212,175,55,.28);
      --radius:28px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:radial-gradient(circle at 10% 10%,#12203d,#03060c 58%,#000);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
    button,input,select{font:inherit}
    button{cursor:pointer}
    .boot{
      position:fixed;inset:0;z-index:50;display:grid;place-items:center;
      background:radial-gradient(circle at center,#10223d,#02040a 70%);
      transition:opacity .7s ease,visibility .7s ease;
    }
    .boot.hide{opacity:0;visibility:hidden}
    .boot-card{text-align:center;border:1px solid var(--line);border-radius:34px;padding:40px;box-shadow:0 0 80px rgba(74,222,128,.14);background:rgba(0,0,0,.35)}
    .boot-logo{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;letter-spacing:.08em;background:linear-gradient(135deg,var(--gold),var(--green),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
    .boot-lines{font-family:ui-monospace,Menlo,Consolas,monospace;color:#b7ffd0;text-align:left;margin-top:24px;line-height:1.8}
    .shell{max-width:1500px;margin:0 auto;padding:18px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:20;padding:14px 0;background:linear-gradient(to bottom,rgba(3,6,12,.96),rgba(3,6,12,.65),transparent);backdrop-filter:blur(12px)}
    .brand{display:flex;align-items:center;gap:12px}
    .orb{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 25%,#fff,#facc15 18%,#22c55e 48%,#0f172a 78%);box-shadow:0 0 24px rgba(74,222,128,.5)}
    h1{font-size:clamp(1.2rem,3vw,2rem);margin:0;letter-spacing:-.04em}
    .sub{color:var(--muted);font-size:.85rem}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav button,.btn{
      border:1px solid var(--line);border-radius:999px;padding:10px 14px;background:rgba(15,23,42,.72);color:var(--text);
      box-shadow:0 12px 25px rgba(0,0,0,.2);transition:.15s transform,.15s background,.15s border-color;text-decoration:none;display:inline-flex;align-items:center;gap:8px
    }
    .nav button:hover,.btn:hover{transform:translateY(-1px);border-color:rgba(212,175,55,.65)}
    .nav button.active,.btn.primary{background:linear-gradient(135deg,#d4af37,#4ade80);color:#07110b;font-weight:900}
    .btn.danger{border-color:rgba(239,68,68,.5);color:#fecaca}
    .grid{display:grid;gap:16px}
    .home-grid{grid-template-columns:1.25fr .75fr}
    .panel{
      background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 22px 60px rgba(0,0,0,.32);backdrop-filter:blur(10px);overflow:hidden
    }
    .hero{min-height:430px;display:flex;flex-direction:column;justify-content:space-between;position:relative}
    .hero:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 72% 32%,rgba(96,165,250,.25),transparent 30%),radial-gradient(circle at 30% 70%,rgba(74,222,128,.16),transparent 34%);pointer-events:none}
    .hero>*{position:relative}
    .big-title{font-size:clamp(2rem,7vw,5.2rem);line-height:.9;margin:0 0 14px;font-weight:950;letter-spacing:-.08em}
    .tiles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .tile{padding:18px;border-radius:22px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08)}
    .tile strong{display:block;font-size:1.15rem;margin-bottom:6px;color:#fef3c7}
    .pill{display:inline-flex;border:1px solid var(--line);background:rgba(212,175,55,.1);border-radius:999px;padding:5px 10px;font-size:.78rem;color:#fde68a;margin:3px}
    .pill.good{border-color:rgba(74,222,128,.45);background:rgba(74,222,128,.1);color:#bbf7d0}
    .pill.blue{border-color:rgba(96,165,250,.45);background:rgba(96,165,250,.1);color:#bfdbfe}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .field{display:grid;gap:7px;margin:10px 0}
    label{font-size:.82rem;color:var(--muted)}
    input,select{width:100%;border:1px solid rgba(212,175,55,.28);background:rgba(0,0,0,.35);color:var(--text);border-radius:16px;padding:11px;outline:none}
    .drop{border:2px dashed rgba(212,175,55,.5);border-radius:28px;min-height:190px;display:grid;place-items:center;text-align:center;padding:22px;background:rgba(212,175,55,.06)}
    .drop.drag{background:rgba(74,222,128,.1);border-color:var(--green)}
    .library{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
    .gamecard{background:linear-gradient(145deg,rgba(15,23,42,.9),rgba(0,0,0,.5));border:1px solid rgba(212,175,55,.25);border-radius:24px;padding:16px;min-height:175px;display:flex;flex-direction:column;justify-content:space-between}
    .gamecard h3{margin:0 0 8px}
    .screen{background:#000;border:1px solid rgba(74,222,128,.35);border-radius:24px;min-height:520px;overflow:hidden;position:relative}
    #game{width:100%;height:72vh;min-height:520px}
    iframe{width:100%;height:70vh;min-height:520px;border:none;background:#000;border-radius:22px}
    .log{font-family:ui-monospace,Menlo,Consolas,monospace;background:rgba(0,0,0,.55);border:1px solid rgba(74,222,128,.25);border-radius:18px;padding:12px;min-height:130px;max-height:240px;overflow:auto;color:#bbf7d0;font-size:.84rem}
    .hidden{display:none!important}
    .modal{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.72);display:grid;place-items:center;padding:18px}
    .modal-card{max-width:620px;width:100%;background:#0f172a;border:1px solid var(--line);border-radius:30px;padding:22px;box-shadow:0 30px 90px rgba(0,0,0,.6)}
    .kbd{font-family:ui-monospace,Menlo,Consolas,monospace;background:#020617;border:1px solid #334155;border-radius:8px;padding:2px 6px;color:#dbeafe}
    @media(max-width:900px){.home-grid{grid-template-columns:1fr}.tiles{grid-template-columns:1fr}.topbar{position:static}.nav{width:100%}.nav button{flex:1;justify-content:center}.big-title{font-size:3rem}#game,.screen,iframe{min-height:430px;height:64vh}}
  </style>
</head>
<body>
  <div class="boot" id="boot">
    <div class="boot-card">
      <div class="boot-logo">AURORA ONE</div>
      <div class="sub">v0.1 browser console · cartridge shell · MEM drawer runtime</div>
      <div class="boot-lines" id="bootLines"></div>
    </div>
  </div>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="orb"></div>
        <div>
          <h1>Aurora One Console</h1>
          <div class="sub">Load ROM · Play · Save Card · Runtime Bay · Export Session</div>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
    </header>

    <main id="main"></main>
  </div>

  <input id="romInput" type="file" class="hidden">
  <input id="sessionInput" type="file" class="hidden" accept=".json,.aurora-session">

<script>
(function(){
  "use strict";
  const EJS_DATA = "https://cdn.emulatorjs.org/stable/data/";
  const STORAGE_KEY = "aurora-one-v01-state";
  const pages = [
    ["home","🏠 Home"],["library","🎮 Library"],["play","▶ Play"],
    ["memory","💾 Memory"],["runtime","🧩 Runtime Bay"],["developer","🛠 Developer"]
  ];

  const coreMap = {
    nes:["nes","fceumm"],fds:["nes","fceumm"],
    smc:["snes","snes9x"],sfc:["snes","snes9x"],
    gb:["gb","gambatte"],gbc:["gb","gambatte"],gba:["gba","mgba"],
    gen:["segaMD","genesis_plus_gx"],md:["segaMD","genesis_plus_gx"],smd:["segaMD","genesis_plus_gx"],
    sms:["segaMS","genesis_plus_gx"],gg:["segaGG","genesis_plus_gx"],
    n64:["n64","mupen64plus_next"],z64:["n64","mupen64plus_next"],v64:["n64","mupen64plus_next"],
    cue:["psx","pcsx_rearmed"],bin:["psx","pcsx_rearmed"],iso:["psx","pcsx_rearmed"],chd:["psx","pcsx_rearmed"]
  };

  let state = loadState();
  let active = "home";
  let lastRomFile = null;
  let lastRomUrl = null;
  let bootedEmulator = false;

  function defaultState(){
    return {
      console:"Aurora One v0.1",
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString(),
      library:[],
      memoryCards:[],
      drawers:[],
      events:[{ts:new Date().toISOString(),type:"boot",msg:"Aurora One first boot"}],
      settings:{runtimeUrl:"https://stackblitz.com/edit/web-platform?embed=1&file=index.html"}
    };
  }
  function loadState(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState(); }catch(e){ return defaultState(); }
  }
  function saveState(){
    state.updatedAt = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  function log(msg,type="info"){
    state.events.unshift({ts:new Date().toISOString(),type,msg});
    state.events = state.events.slice(0,200);
    saveState();
    const box = document.getElementById("logBox");
    if(box) box.innerHTML = state.events.slice(0,40).map(e=>`<div>[${new Date(e.ts).toLocaleTimeString()}] ${escapeHtml(e.type)} · ${escapeHtml(e.msg)}</div>`).join("");
  }
  function uid(p){return p+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,8)}
  function escAttr(s){return String(s||"").replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
  function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
  function ext(name){const p=String(name||"").toLowerCase().split(".");return p.length>1?p.pop():""}
  function detectCore(name){
    const e = ext(name);
    return coreMap[e] || ["nes","fceumm"];
  }
  function nav(){
    document.getElementById("nav").innerHTML = pages.map(([id,label])=>`<button class="${active===id?"active":""}" data-page="${id}">${label}</button>`).join("");
    document.querySelectorAll("[data-page]").forEach(b=>b.onclick=()=>{active=b.dataset.page; render();});
  }
  function render(){
    nav();
    ({home,library,play,memory,runtime,developer}[active]||home)();
  }
  function baseStats(){
    return `
      <span class="pill good">${state.library.length} GameCards</span>
      <span class="pill blue">${state.memoryCards.length} Memory Cards</span>
      <span class="pill">${state.drawers.length} Drawers</span>
      <span class="pill">${state.events.length} Events</span>`;
  }
  function home(){
    document.getElementById("main").innerHTML = `
      <section class="grid home-grid">
        <div class="panel hero">
          <div>
            <div class="pill good">Runnable now</div><div class="pill blue">Browser console</div><div class="pill">User-supplied ROMs only</div>
            <h2 class="big-title">Boot. Load. Play. Save.</h2>
            <p class="sub" style="max-width:760px;font-size:1.05rem">
              Aurora One v0.1 is a real browser console shell. It mounts legally owned ROM files through EmulatorJS,
              creates GameCards, stores session drawers, and provides a runtime bay for nested tools.
            </p>
          </div>
          <div class="row">
            <button class="btn primary" id="loadRomHome">📦 Load ROM / Game File</button>
            <button class="btn" id="continueBtn">▶ Continue Last</button>
            <button class="btn" id="fullBtn">⛶ Fullscreen</button>
          </div>
        </div>
        <aside class="panel">
          <h2>Console State</h2>
          <p>${baseStats()}</p>
          <div class="tiles">
            <div class="tile"><strong>Mario / Zelda</strong><span class="sub">NES, SNES, GB/GBA user ROMs</span></div>
            <div class="tile"><strong>Sonic</strong><span class="sub">Mega Drive / Master System user ROMs</span></div>
            <div class="tile"><strong>Final Fantasy</strong><span class="sub">NES/SNES/GBA/PS1 files, BIOS where legally required</span></div>
          </div>
          <h3>Event Log</h3>
          <div class="log" id="logBox">${state.events.slice(0,30).map(e=>`<div>[${new Date(e.ts).toLocaleTimeString()}] ${escapeHtml(e.type)} · ${escapeHtml(e.msg)}</div>`).join("")}</div>
        </aside>
      </section>`;
    document.getElementById("loadRomHome").onclick=()=>document.getElementById("romInput").click();
    document.getElementById("continueBtn").onclick=()=>{active="library";render()};
    document.getElementById("fullBtn").onclick=()=>toggleFullscreen();
  }
  function library(){
    document.getElementById("main").innerHTML = `
      <section class="grid">
        <div class="panel">
          <div class="row" style="justify-content:space-between">
            <div><h2>Game Library</h2><p class="sub">Load your own legal ROM/game files. The browser cannot permanently keep the actual ROM unless you load it again; GameCards preserve metadata.</p></div>
            <button class="btn primary" id="loadRomLib">📦 Add GameCard</button>
          </div>
        </div>
        <div class="library">
          ${state.library.map(card=>`
            <article class="gamecard">
              <div>
                <h3>${escapeHtml(card.title)}</h3>
                <span class="pill good">${escapeHtml(card.system)}</span>
                <span class="pill blue">${escapeHtml(card.core)}</span>
                <p class="sub">${escapeHtml(card.fileName)} · ${escapeHtml(card.sizeLabel||"")}</p>
              </div>
              <div class="row">
                <button class="btn primary" data-play-card="${escAttr(card.id)}">▶ Play</button>
                <button class="btn" data-drawer-card="${escAttr(card.id)}">💾 Drawer</button>
                <button class="btn danger" data-delete-card="${escAttr(card.id)}">✕</button>
              </div>
            </article>`).join("") || `<div class="panel"><h2>No games mounted yet</h2><p class="sub">Click Add GameCard and choose a ROM file you legally own.</p></div>`}
        </div>
      </section>`;
    document.getElementById("loadRomLib").onclick=()=>document.getElementById("romInput").click();
    document.querySelectorAll("[data-delete-card]").forEach(b=>b.onclick=()=>{state.library=state.library.filter(c=>c.id!==b.dataset.deleteCard);saveState();render();});
    document.querySelectorAll("[data-drawer-card]").forEach(b=>b.onclick=()=>saveDrawer(b.dataset.drawerCard));
    document.querySelectorAll("[data-play-card]").forEach(b=>b.onclick=()=>playCard(b.dataset.playCard));
  }
  function play(){
    document.getElementById("main").innerHTML = `
      <section class="grid">
        <div class="panel">
          <div class="row" style="justify-content:space-between">
            <div><h2>Player Screen</h2><p class="sub">Load a ROM file first. EmulatorJS starts inside the black console screen.</p></div>
            <div class="row">
              <button class="btn primary" id="loadRomPlay">📦 Load ROM</button>
              <button class="btn" id="makeMemory">💾 Save Memory Card</button>
              <button class="btn" id="resetScreen">↻ Reset Screen</button>
            </div>
          </div>
        </div>
        <div class="screen"><div id="game"></div></div>
      </section>`;
    document.getElementById("loadRomPlay").onclick=()=>document.getElementById("romInput").click();
    document.getElementById("makeMemory").onclick=()=>createMemoryCard();
    document.getElementById("resetScreen").onclick=()=>{document.getElementById("game").innerHTML="";bootedEmulator=false;log("Player screen reset")};
    if(lastRomFile && !bootedEmulator) startEmulator(lastRomFile);
  }
  function memory(){
    document.getElementById("main").innerHTML = `
      <section class="grid home-grid">
        <div class="panel">
          <h2>Memory Cards</h2>
          <p class="sub">These are Aurora-side metadata saves. Use EmulatorJS internal save states for emulator-native states, then use drawers to preserve console context.</p>
          <div class="library">
            ${state.memoryCards.map(m=>`
              <article class="gamecard"><div><h3>${escapeHtml(m.title)}</h3><p class="sub">${escapeHtml(m.note)}</p><span class="pill">${new Date(m.createdAt).toLocaleString()}</span></div></article>`).join("") || `<p class="sub">No memory cards yet.</p>`}
          </div>
        </div>
        <div class="panel">
          <h2>Drawers</h2>
          <p class="sub">A drawer is a resumable console-state bookmark.</p>
          ${state.drawers.map(d=>`<div class="tile"><strong>${escapeHtml(d.title)}</strong><div class="sub">${escapeHtml(d.detail)}</div><span class="pill">${new Date(d.createdAt).toLocaleString()}</span></div>`).join("") || `<p class="sub">No drawers yet.</p>`}
          <div class="row" style="margin-top:14px">
            <button class="btn primary" id="exportSession">⬇ Export Session</button>
            <button class="btn" id="importSession">⬆ Import Session</button>
          </div>
        </div>
      </section>`;
    document.getElementById("exportSession").onclick=exportSession;
    document.getElementById("importSession").onclick=()=>document.getElementById("sessionInput").click();
  }
  function runtime(){
    document.getElementById("main").innerHTML = `
      <section class="grid">
        <div class="panel">
          <h2>Runtime Bay</h2>
          <p class="sub">Nested tool bay. This is where V86, StackBlitz, VS Code Nest, docs, or self-hosted tools can mount inside the console.</p>
          <div class="row">
            <button class="btn" data-runtime="https://copy.sh/v86/?profile=alpine">🐚 Alpine V86</button>
            <button class="btn" data-runtime="https://webvm.io/?autostart=true">📀 WebVM</button>
            <button class="btn" data-runtime="https://stackblitz.com/edit/web-platform?embed=1&file=index.html">⚡ StackBlitz</button>
            <button class="btn" data-runtime="https://vscode.dev">💻 VS Code Web</button>
          </div>
          <div class="field"><label>Custom runtime URL</label><input id="runtimeUrl" value="${escAttr(state.settings.runtimeUrl)}"></div>
          <button class="btn primary" id="launchRuntime">Launch Runtime</button>
        </div>
        <iframe id="runtimeFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox" allow="clipboard-read; clipboard-write" src="${escAttr(state.settings.runtimeUrl)}"></iframe>
      </section>`;
    document.querySelectorAll("[data-runtime]").forEach(b=>b.onclick=()=>{state.settings.runtimeUrl=b.dataset.runtime;saveState();runtime();log("Runtime mounted: "+b.dataset.runtime,"runtime")});
    document.getElementById("launchRuntime").onclick=()=>{let u=document.getElementById("runtimeUrl").value.trim(); if(u&&!/^https?:\/\//.test(u)) u="https://"+u; state.settings.runtimeUrl=u; saveState(); runtime();};
  }
  function developer(){
    document.getElementById("main").innerHTML = `
      <section class="grid home-grid">
        <div class="panel">
          <h2>Developer Mode</h2>
          <p class="sub">Raw state, event log, and factory controls. This is hidden from the player path.</p>
          <div class="row">
            <button class="btn primary" id="exportJson">Export JSON</button>
            <button class="btn danger" id="factoryReset">Factory Reset</button>
          </div>
          <h3>State</h3>
          <pre class="log" style="white-space:pre-wrap">${escapeHtml(JSON.stringify(state,null,2))}</pre>
        </div>
        <div class="panel">
          <h2>Legal Runtime Rule</h2>
          <p class="sub">Aurora One supplies the console shell. The user supplies only games/BIOS files they legally own. No copyrighted ROMs are bundled.</p>
          <h2>Engine</h2>
          <p class="sub">EmulatorJS is loaded from its stable CDN data path. Some systems need browser power, correct file format, and legal BIOS files.</p>
        </div>
      </section>`;
    document.getElementById("exportJson").onclick=exportSession;
    document.getElementById("factoryReset").onclick=()=>{if(confirm("Reset Aurora One local state?")){localStorage.removeItem(STORAGE_KEY);state=defaultState();render();}};
  }

  function formatBytes(n){n=Number(n||0); if(n<1024)return n+" B"; if(n<1048576)return(n/1024).toFixed(1)+" KB"; if(n<1073741824)return(n/1048576).toFixed(1)+" MB"; return(n/1073741824).toFixed(2)+" GB";}
  function ingestRom(file){
    if(!file) return;
    lastRomFile = file;
    const [system,core] = detectCore(file.name);
    const card = {
      id:uid("gamecard"), title:file.name.replace(/\.[^.]+$/,""), fileName:file.name, size:file.size, sizeLabel:formatBytes(file.size),
      system, core, ext:ext(file.name), addedAt:new Date().toISOString()
    };
    state.library.unshift(card);
    state.library = state.library.slice(0,60);
    saveState();
    log("GameCard mounted: "+file.name,"gamecard");
    active = "play";
    render();
    startEmulator(file, card);
  }
  function startEmulator(file, card){
    active = "play";
    if(!document.getElementById("game")) render();
    const target = document.getElementById("game");
    if(!target) return;
    target.innerHTML = "";
    if(lastRomUrl) URL.revokeObjectURL(lastRomUrl);
    lastRomUrl = URL.createObjectURL(file);
    const [system,core] = detectCore(file.name);
    window.EJS_player = "#game";
    window.EJS_core = system;
    window.EJS_gameName = file.name.replace(/\.[^.]+$/,"");
    window.EJS_gameUrl = lastRomUrl;
    window.EJS_pathtodata = EJS_DATA;
    window.EJS_startOnLoaded = true;
    window.EJS_DEBUG_XX = false;
    window.EJS_defaultOptions = {
      "save-state-slot": 1,
      "shader": "crt-easymode"
    };
    const old = document.getElementById("ejs_loader");
    if(old) old.remove();
    const s = document.createElement("script");
    s.id = "ejs_loader";
    s.src = EJS_DATA + "loader.js";
    s.onload = ()=>{bootedEmulator=true;log("Emulator started: "+file.name+" using "+system,"play")};
    s.onerror = ()=>{log("Could not load EmulatorJS loader. Check internet/CDN access.","error")};
    document.body.appendChild(s);
  }
  function playCard(id){
    const card = state.library.find(c=>c.id===id);
    alert("Browser security requires re-selecting the ROM file each session. Choose the same file for: "+(card?.fileName||"this GameCard"));
    document.getElementById("romInput").click();
  }
  function createMemoryCard(){
    const title = prompt("Memory card title:", lastRomFile ? lastRomFile.name+" memory" : "Aurora memory card");
    if(!title) return;
    const note = prompt("Note:", "Saved from Aurora One player screen") || "";
    state.memoryCards.unshift({id:uid("mem"),title,note,game:lastRomFile?.name||"",createdAt:new Date().toISOString()});
    saveState(); log("Memory Card created: "+title,"memory"); active="memory"; render();
  }
  function saveDrawer(cardId){
    const card = state.library.find(c=>c.id===cardId);
    state.drawers.unshift({id:uid("drawer"),title:(card?.title||"Aurora")+" drawer",detail:"Resume context for "+(card?.fileName||"unknown game"),cardId,createdAt:new Date().toISOString()});
    saveState(); log("Drawer saved for "+(card?.title||"game"),"drawer"); active="memory"; render();
  }
  function exportSession(){
    const payload = {format:"aurora-one-session-v0.1", exportedAt:new Date().toISOString(), state};
    const blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "aurora-one-session.aurora-session.json";
    a.click();
    URL.revokeObjectURL(a.href);
    log("Session exported","export");
  }
  function importSession(file){
    const r = new FileReader();
    r.onload = () => {
      try{
        const parsed = JSON.parse(String(r.result));
        if(parsed.format==="aurora-one-session-v0.1" && parsed.state){
          state = parsed.state; saveState(); log("Session imported","import"); active="home"; render();
        } else alert("Not an Aurora One v0.1 session file.");
      }catch(e){alert("Invalid JSON session file.");}
    };
    r.readAsText(file);
  }
  function toggleFullscreen(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

  document.getElementById("romInput").addEventListener("change",e=>{const f=e.target.files?.[0]; e.target.value=""; ingestRom(f);});
  document.getElementById("sessionInput").addEventListener("change",e=>{const f=e.target.files?.[0]; e.target.value=""; if(f) importSession(f);});

  document.addEventListener("dragover",e=>{e.preventDefault();});
  document.addEventListener("drop",e=>{
    e.preventDefault();
    const f = e.dataTransfer.files?.[0];
    if(!f) return;
    if(f.name.endsWith(".json") || f.name.endsWith(".aurora-session")) importSession(f);
    else ingestRom(f);
  });

  const bootLines = [
    "checking display bus...",
    "mounting MEM drawer...",
    "loading cartridge shell...",
    "binding EmulatorJS runtime...",
    "controller path: keyboard / gamepad / browser...",
    "AURORA ONE READY"
  ];
  let i=0;
  const bl = document.getElementById("bootLines");
  const timer = setInterval(()=>{
    bl.innerHTML += `<div>&gt; ${bootLines[i]||"ready"}</div>`;
    i++;
    if(i>=bootLines.length){clearInterval(timer);setTimeout(()=>document.getElementById("boot").classList.add("hide"),650);}
  },280);

  render();
})();
</script>
</body>
</html>
