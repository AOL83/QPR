<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEM Palace Game Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      --bg0: #030201;
      --bg1: #120704;
      --panel: rgba(0, 0, 0, 0.48);
      --panel2: rgba(255, 145, 55, 0.07);
      --border: rgba(255, 166, 80, 0.28);
      --border2: rgba(255, 166, 80, 0.48);
      --text: #fff2df;
      --muted: rgba(255, 232, 207, 0.62);
      --faint: rgba(255, 232, 207, 0.38);
      --orange: #ff9838;
      --orange2: #ffc278;
      --green: #4ade80;
      --red: #fb7185;
      --blue: #7dd3fc;
      --purple: #d8b4fe;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #3b1d0b, #080403 45%, #030201);
      color: var(--text);
    }

    button, input, textarea, select { font: inherit; }

    .app {
      min-height: 100vh;
      padding: 18px;
    }

    .shell {
      width: min(1500px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .header, .nav, .card {
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 18px 40px var(--shadow);
      backdrop-filter: blur(10px);
    }

    .header {
      border-radius: 28px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-icon { font-size: 34px; filter: drop-shadow(0 0 14px rgba(255,152,56,0.55)); }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(26px, 4vw, 42px); line-height: 1; letter-spacing: -0.04em; }
    .subtitle { margin-top: 8px; color: var(--muted); font-weight: 700; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid rgba(216,180,254,0.36);
      background: rgba(216,180,254,0.1);
      color: #ead7ff;
      padding: 7px 11px;
      font-size: 12px;
      white-space: nowrap;
    }
    .pill.orange { border-color: rgba(255,194,120,0.35); background: rgba(255,152,56,0.12); color: #ffe1bd; }
    .pill.green { border-color: rgba(74,222,128,0.35); background: rgba(74,222,128,0.11); color: #bbf7d0; }
    .pill.red { border-color: rgba(251,113,133,0.35); background: rgba(251,113,133,0.11); color: #fecdd3; }
    .pill.blue { border-color: rgba(125,211,252,0.35); background: rgba(125,211,252,0.11); color: #bae6fd; }
    .pill.purple { border-color: rgba(216,180,254,0.35); background: rgba(216,180,254,0.11); color: #ead7ff; }

    .nav {
      border-radius: 18px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 8px;
      z-index: 10;
    }

    .tab-btn, .btn {
      border: 0;
      border-radius: 14px;
      padding: 10px 13px;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
      font-weight: 800;
    }

    .tab-btn {
      color: var(--text);
      background: transparent;
    }
    .tab-btn:hover { background: rgba(255,152,56,0.1); transform: translateY(-1px); }
    .tab-btn.active { color: #130702; background: var(--orange); }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      align-items: start;
    }

    .aside { display: grid; gap: 16px; }
    .card { border-radius: 22px; padding: 18px; }
    .card h2 { font-size: 19px; margin-bottom: 12px; }
    .card h3 { font-size: 24px; margin-bottom: 8px; color: var(--orange2); }
    .muted { color: var(--muted); }
    .faint { color: var(--faint); }
    .small { font-size: 13px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat { border-radius: 15px; background: rgba(0,0,0,0.32); padding: 12px; }
    .stat .num { font-size: 26px; font-weight: 950; margin-top: 4px; }

    .main { min-width: 0; }
    .view { display: none; animation: fade 180ms ease both; }
    .view.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
    .stack { display: grid; gap: 14px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #140700;
      background: var(--orange);
    }
    .btn:hover { background: #ffb366; transform: translateY(-1px); }
    .btn.ghost { color: var(--text); background: rgba(0,0,0,0.24); border: 1px solid var(--border); }
    .btn.ghost:hover { background: rgba(255,152,56,0.1); border-color: var(--border2); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn.full { width: 100%; }

    .drop-zone {
      border: 2px dashed rgba(255,152,56,0.6);
      background: linear-gradient(135deg, rgba(255,152,56,0.15), rgba(216,180,254,0.08));
      border-radius: 24px;
      padding: 26px;
      min-height: 170px;
      display: grid;
      place-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .drop-zone::before {
      content: "";
      position: absolute;
      inset: -70px;
      background: radial-gradient(circle, rgba(255,152,56,.18), transparent 60%);
      opacity: .65;
      pointer-events: none;
    }
    .drop-zone.dragging {
      border-color: #fff;
      background: rgba(255,152,56,0.22);
    }
    .drop-inner { position: relative; z-index: 1; display: grid; gap: 8px; }
    .drop-icon { font-size: 42px; }

    .item {
      border: 1px solid rgba(255,166,80,0.18);
      background: rgba(0,0,0,0.28);
      border-radius: 16px;
      padding: 13px;
      min-width: 0;
    }
    .item.active { border-color: rgba(255,152,56,0.82); background: rgba(255,152,56,0.12); }
    .item-title { font-weight: 900; overflow-wrap: anywhere; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.42);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 150px; resize: vertical; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    select option { background: #130702; }

    .iframe, .video {
      width: 100%;
      height: 520px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #000;
    }
    .iframe { background: #fff; }
    .video { object-fit: contain; }

    .hidden { display: none; }
    .notice {
      border: 1px solid rgba(125,211,252,0.3);
      background: rgba(125,211,252,0.08);
      color: #dff6ff;
      border-radius: 16px;
      padding: 12px;
    }
    .warn {
      border-color: rgba(251,113,133,0.34);
      background: rgba(251,113,133,0.09);
      color: #ffe4e8;
    }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 100;
      max-width: min(520px, calc(100vw - 36px));
      border: 1px solid var(--border2);
      background: rgba(10, 4, 2, 0.94);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
      display: none;
    }
    .toast.show { display: block; animation: toastIn 160ms ease both; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
      .iframe, .video { height: 420px; }
    }
    @media (max-width: 640px) {
      .app { padding: 10px; }
      .header { align-items: flex-start; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .nav { position: static; }
      .tab-btn, .btn { width: 100%; }
      .btn-row { width: 100%; }
      .iframe, .video { height: 320px; }
    }
  </style>
</head>
<body>
  <div id="app" class="app">
    <div class="shell">
      <header class="header">
        <div>
          <div class="brand">
            <div class="brand-icon">🎮</div>
            <div>
              <h1>MEM Palace Game Terminal</h1>
              <p class="subtitle">LOAD → INSPECT → BLUEPRINT → RUN / ATTACH → OBSERVE → BUILD</p>
            </div>
          </div>
        </div>
        <span class="pill purple">Dual-card save architecture</span>
      </header>

      <nav id="nav" class="nav"></nav>

      <div class="layout">
        <aside class="aside">
          <section class="card">
            <h2>Project Stats</h2>
            <div id="stats" class="stats-grid"></div>
          </section>

          <section class="card">
            <h2>Current Room</h2>
            <div id="currentRoomAside"></div>
            <div class="stack" style="margin-top:14px">
              <button id="saveDrawerBtn" class="btn ghost full">📦 Save Drawer</button>
              <button id="exportActiveDrawerBtn" class="btn ghost full">⬇️ Export Active Drawer</button>
              <button id="saveFullSessionBtn" class="btn full">⬇️ Save Full Session</button>
            </div>
          </section>
        </aside>

        <main class="main">
          <section id="view-load" class="view"></section>
          <section id="view-inspect" class="view"></section>
          <section id="view-play" class="view"></section>
          <section id="view-cards" class="view"></section>
          <section id="view-history" class="view"></section>
          <section id="view-palace" class="view"></section>
          <section id="view-blueprint" class="view"></section>
          <section id="view-timeline" class="view"></section>
          <section id="view-notes" class="view"></section>
          <section id="view-build" class="view"></section>
        </main>
      </div>
    </div>
  </div>

  <input id="zipInput" class="hidden" type="file" accept=".zip" />
  <input id="folderInput" class="hidden" type="file" multiple webkitdirectory directory />
  <input id="saveInput" class="hidden" type="file" />
  <input id="memInput" class="hidden" type="file" accept=".json,.memsave,.memdrawer,.memsession" />
  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = "mem-palace-game-terminal-v1";

    const now = () => new Date().toISOString();
    const uid = (prefix = "id") => `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const ext = (name = "") => {
      const parts = String(name).toLowerCase().split(".");
      return parts.length > 1 ? parts.pop() : "";
    };
    const slug = (input = "mem-palace") => String(input).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "mem-palace";
    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    const seedProject = {
      project: {
        id: "ff7-pc-beta",
        title: "Final Fantasy VII PC Beta Map",
        subtitle: "Game Load Test Console",
        type: "game-companion",
        createdAt: now(),
        updatedAt: now(),
      },
      package: {
        name: "No package loaded",
        sourceType: "none",
        runMode: "none",
        entryCandidates: [],
        detectedFolders: [],
        detectedFiles: [],
        detectedScripts: [],
        detectedAssets: [],
        detectedExecutables: [],
        detectedJson: [],
        warnings: [],
        importReport: null,
      },
      runtime: {
        status: "idle",
        runMode: "none",
        internalHtml: "",
        internalEntry: "",
        externalInstructions: [],
      },
      currentNodeId: "midgar",
      nodes: [
        {
          id: "midgar",
          type: "location",
          title: "Midgar",
          description: "Central city hub and opening region.",
          connections: ["sector-7", "reactor-1", "shinra-building"],
          characters: ["cloud", "barret", "tifa", "aerith"],
          items: [],
          events: ["evt-opening"],
          screenshots: [],
          notes: ["Use this as the first palace wing for the beta test."],
          tags: ["city", "opening", "hub"],
          createdAt: now(),
        },
        {
          id: "reactor-1",
          type: "location",
          title: "Mako Reactor 1",
          description: "Opening bombing mission area.",
          connections: ["midgar", "guard-scorpion"],
          characters: ["cloud", "barret", "biggs", "wedge", "jessie"],
          items: [],
          events: ["evt-bombing-mission"],
          screenshots: [],
          notes: [],
          tags: ["reactor", "mission", "midgar"],
          createdAt: now(),
        },
        {
          id: "sector-7",
          type: "location",
          title: "Sector 7",
          description: "Avalanche base area and early story hub.",
          connections: ["midgar", "seventh-heaven"],
          characters: ["cloud", "barret", "tifa"],
          items: [],
          events: [],
          screenshots: [],
          notes: [],
          tags: ["slums", "avalanche"],
          createdAt: now(),
        },
        {
          id: "shinra-building",
          type: "location",
          title: "Shinra Building",
          description: "Major Midgar infiltration sequence.",
          connections: ["midgar"],
          characters: ["cloud", "barret", "tifa", "aerith", "red-xiii"],
          items: [],
          events: [],
          screenshots: [],
          notes: [],
          tags: ["midgar", "shinra", "infiltration"],
          createdAt: now(),
        },
        {
          id: "guard-scorpion",
          type: "battle",
          title: "Guard Scorpion",
          description: "First boss encounter. Watch the tail warning.",
          connections: ["reactor-1"],
          characters: ["cloud", "barret"],
          items: [],
          events: [],
          screenshots: [],
          notes: ["Capture battle timing and tutorial dialogue."],
          tags: ["boss", "tutorial", "reactor-1"],
          createdAt: now(),
        },
      ],
      edges: [
        { id: "edge-midgar-reactor", from: "midgar", to: "reactor-1", label: "mission route" },
        { id: "edge-reactor-boss", from: "reactor-1", to: "guard-scorpion", label: "boss trigger" },
        { id: "edge-midgar-sector", from: "midgar", to: "sector-7", label: "hub path" },
      ],
      timeline: [
        {
          id: "evt-opening",
          timestamp: now(),
          nodeId: "midgar",
          type: "story",
          title: "Opening sequence",
          summary: "Begin mapping the first FF7 run as a memory palace.",
          tags: ["opening"],
        },
        {
          id: "evt-bombing-mission",
          timestamp: now(),
          nodeId: "reactor-1",
          type: "story",
          title: "Bombing mission begins",
          summary: "Cloud joins Avalanche during the Reactor 1 mission.",
          tags: ["mission", "reactor"],
        },
      ],
      inventory: [],
      characters: [
        { id: "cloud", name: "Cloud Strife", role: "party", notes: [] },
        { id: "barret", name: "Barret Wallace", role: "party", notes: [] },
        { id: "tifa", name: "Tifa Lockhart", role: "party", notes: [] },
        { id: "aerith", name: "Aerith Gainsborough", role: "party", notes: [] },
      ],
      observations: [],
      captures: [],
      memoryCards: { gameCards: [], palCards: [], pairs: [], activePairId: "" },
      progressionDrawers: { drawers: [], activeDrawerId: "", pinnedDrawerIds: [] },
    };

    const tabs = [
      ["load", "📦", "Load"],
      ["inspect", "🔎", "Inspect"],
      ["play", "▶️", "Run / Attach"],
      ["cards", "💳", "Memory Cards"],
      ["history", "🗄️", "Drawers"],
      ["palace", "🗺️", "Palace"],
      ["blueprint", "🧬", "Blueprint"],
      ["timeline", "📝", "Timeline"],
      ["notes", "📖", "Notes"],
      ["build", "🪄", "Build"],
    ];

    let state = loadStoredState();
    let activeTab = "load";
    let captureStream = null;
    let videoEl = null;

    function loadStoredState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          return normalizeState(parsed);
        }
      } catch {}
      return structuredCloneSafe(seedProject);
    }

    function structuredCloneSafe(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function normalizeState(data) {
      const next = { ...structuredCloneSafe(seedProject), ...data };
      next.package = { ...structuredCloneSafe(seedProject.package), ...(data.package || {}) };
      next.runtime = { ...structuredCloneSafe(seedProject.runtime), ...(data.runtime || {}) };
      next.memoryCards = { gameCards: [], palCards: [], pairs: [], activePairId: "", ...(data.memoryCards || {}) };
      next.progressionDrawers = { drawers: [], activeDrawerId: "", pinnedDrawerIds: [], ...(data.progressionDrawers || {}) };
      next.nodes = Array.isArray(data.nodes) ? data.nodes : seedProject.nodes;
      next.edges = Array.isArray(data.edges) ? data.edges : seedProject.edges;
      next.timeline = Array.isArray(data.timeline) ? data.timeline : seedProject.timeline;
      next.captures = Array.isArray(data.captures) ? data.captures : [];
      return next;
    }

    function saveLocal() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch {
        toast("Local save failed. Large screenshots can overflow browser storage. Export a full session as backup.", "warn");
      }
    }

    function setState(updater, shouldRender = true) {
      const next = typeof updater === "function" ? updater(state) : updater;
      state = normalizeState({
        ...next,
        project: {
          ...(next.project || state.project),
          updatedAt: now(),
        },
      });
      saveLocal();
      if (shouldRender) render();
    }

    function currentNode() {
      return state.nodes.find((node) => node.id === state.currentNodeId) || state.nodes[0];
    }

    function statusTone(status) {
      if (status === "synced") return "green";
      if (status === "out-of-sync" || status === "conflict") return "red";
      if (String(status || "").startsWith("missing")) return "red";
      if (status === "legacy") return "purple";
      return "blue";
    }

    function getPairStatus(gameCard, palCard) {
      if (!gameCard && !palCard) return "unpaired";
      if (!gameCard) return "missing-gamecard";
      if (!palCard) return "missing-palcard";
      const pairing = palCard.pairing || {};
      if (!pairing.gameCardId || pairing.gameCardId !== gameCard.id) return "unpaired";
      if (pairing.gameSaveHash && gameCard.saveFile?.hash && pairing.gameSaveHash !== gameCard.saveFile.hash) return "out-of-sync";
      return "synced";
    }

    function pairViews() {
      const cards = state.memoryCards;
      return (cards.pairs || []).map((pair) => {
        const gameCard = (cards.gameCards || []).find((card) => card.id === pair.gameCardId);
        const palCard = (cards.palCards || []).find((card) => card.id === pair.palCardId);
        return { ...pair, gameCard, palCard, status: getPairStatus(gameCard, palCard) };
      });
    }

    function pill(text, tone = "orange") {
      return `<span class="pill ${tone}">${escapeHtml(text)}</span>`;
    }

    function toast(message, tone = "info") {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.className = `toast show ${tone}`;
      window.clearTimeout(toast._timer);
      toast._timer = window.setTimeout(() => el.classList.remove("show"), 4300);
    }

    function downloadText(filename, text, type = "text/plain") {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    async function sha256File(file) {
      if (!crypto.subtle) {
        return `sha256-unavailable-${file.size}-${file.lastModified || Date.now()}`;
      }
      const buffer = await file.arrayBuffer();
      const digest = await crypto.subtle.digest("SHA-256", buffer);
      return Array.from(new Uint8Array(digest)).map((byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    function inspectFiles(files, sourceType, packageName) {
      const fileList = Array.from(files || []).map((file) => ({
        name: file.name || String(file.path || "unnamed"),
        path: file.path || file.webkitRelativePath || file.name || "unnamed",
        size: file.size || 0,
        type: file.type || "",
        extension: ext(file.name || file.path || ""),
      }));

      const folders = Array.from(new Set(
        fileList
          .map((file) => file.path.split("/").slice(0, -1).join("/"))
          .filter(Boolean)
      ));

      const scripts = fileList.filter((file) => ["js", "ts", "mjs", "jsx", "tsx"].includes(file.extension));
      const assets = fileList.filter((file) => ["png", "jpg", "jpeg", "webp", "gif", "svg", "mp3", "ogg", "wav", "mp4", "webm"].includes(file.extension));
      const executables = fileList.filter((file) => ["exe", "bat", "cmd", "app", "msi"].includes(file.extension));
      const htmlEntries = fileList.filter((file) => file.name.toLowerCase() === "index.html" || file.extension === "html");
      const jsonFiles = fileList.filter((file) => file.extension === "json");

      let runMode = "external-attach";
      const warnings = [];
      if (htmlEntries.length) {
        runMode = "internal-html";
      } else if (executables.length) {
        runMode = "external-attach";
        warnings.push("Native executables/installers cannot run inside a browser. Run the game normally on the PC, then use Attach Capture.");
      } else {
        runMode = "inspect-only";
        warnings.push("No browser-runnable HTML entry point was detected. Blueprint inspection still works.");
      }

      if (!window.JSZip && fileList.some((file) => file.extension === "zip")) {
        warnings.push("JSZip did not load from the CDN, so ZIP extraction is unavailable. Folder/file drop still works.");
      }

      return {
        name: packageName,
        sourceType,
        runMode,
        entryCandidates: [...htmlEntries.map((file) => file.path), ...executables.map((file) => file.path)],
        detectedFolders: folders,
        detectedFiles: fileList,
        detectedScripts: scripts,
        detectedAssets: assets,
        detectedExecutables: executables,
        detectedJson: jsonFiles,
        warnings,
        importReport: {
          filesFound: fileList.length,
          foldersFound: folders.length,
          assetsFound: assets.length,
          scriptsFound: scripts.length,
          executablesFound: executables.length,
          generatedAt: now(),
        },
      };
    }

    function createBlueprintFromPackage(pkg) {
      const nodes = [{
        id: "pkg-root",
        type: "package",
        source: "package",
        title: pkg.name || "Loaded Package",
        description: `Source: ${pkg.sourceType}. Run mode: ${pkg.runMode}.`,
        tags: ["package", pkg.sourceType, pkg.runMode].filter(Boolean),
      }];
      const edges = [];

      for (const folder of pkg.detectedFolders || []) {
        const id = `folder-${slug(folder)}`;
        nodes.push({ id, type: "folder", source: "package", title: folder, description: "Detected package folder.", tags: ["folder"] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "contains", source: "package" });
      }

      for (const file of pkg.detectedExecutables || []) {
        const id = `exe-${slug(file.path)}`;
        nodes.push({ id, type: "executable", source: "package", title: file.name, description: file.path, tags: ["executable"] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "entry candidate", source: "package" });
      }

      for (const file of pkg.detectedScripts || []) {
        const id = `script-${slug(file.path)}`;
        nodes.push({ id, type: "script", source: "package", title: file.name, description: file.path, tags: ["script", file.extension] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "script", source: "package" });
      }

      for (const file of (pkg.detectedAssets || []).slice(0, 70)) {
        const id = `asset-${slug(file.path)}`;
        nodes.push({ id, type: "asset", source: "package", title: file.name, description: file.path, tags: ["asset", file.extension] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "asset", source: "package" });
      }

      return { nodes, edges };
    }

    async function loadZip(file) {
      if (!file) return;
      if (!window.JSZip) {
        toast("JSZip did not load, so this browser cannot inspect ZIP files yet. Drop an extracted folder instead.", "warn");
        return;
      }

      try {
        const zip = await JSZip.loadAsync(await file.arrayBuffer());
        const files = Object.values(zip.files)
          .filter((entry) => !entry.dir)
          .map((entry) => ({
            name: entry.name.split("/").pop(),
            path: entry.name,
            size: entry._data?.uncompressedSize || 0,
            type: "",
          }));

        const pkg = inspectFiles(files, "zip", file.name.replace(/\.zip$/i, ""));
        const blueprint = createBlueprintFromPackage(pkg);

        let runtime = {
          status: "loaded",
          runMode: pkg.runMode,
          internalHtml: "",
          internalEntry: pkg.entryCandidates[0] || "",
          externalInstructions: pkg.warnings,
        };

        if (pkg.runMode === "internal-html") {
          const entry = pkg.entryCandidates.find((candidate) => candidate.toLowerCase().endsWith(".html"));
          const html = entry ? await zip.file(entry)?.async("string") : "";
          runtime = { ...runtime, internalHtml: html || "<p>No HTML entry could be loaded.</p>", internalEntry: entry || "" };
        }

        setState((prev) => ({
          ...prev,
          package: pkg,
          runtime,
          nodes: [...prev.nodes.filter((node) => node.source !== "package"), ...blueprint.nodes],
          edges: [...prev.edges.filter((edge) => edge.source !== "package"), ...blueprint.edges],
          timeline: [{
            id: uid("evt"),
            timestamp: now(),
            nodeId: prev.currentNodeId,
            type: "load",
            title: `Loaded ZIP: ${pkg.name}`,
            summary: `Inspected ${pkg.importReport.filesFound} files and generated a blueprint.`,
            tags: ["load", "zip"],
          }, ...prev.timeline],
        }));
        activeTab = "inspect";
        render();
        toast(`Loaded ZIP: ${file.name}`);
      } catch (error) {
        console.error(error);
        toast("ZIP load failed. The file may be corrupt, blocked, or not a real ZIP.", "warn");
      }
    }

    async function loadFolder(files) {
      const list = Array.from(files || []);
      if (!list.length) {
        toast("No readable files were found. If these are cloud placeholders, make them available offline first.", "warn");
        return;
      }

      const root = list[0].webkitRelativePath?.split("/")[0] || list[0].path?.split("/")[0] || "Dropped Files";
      const pkg = inspectFiles(list, "folder", root);
      const blueprint = createBlueprintFromPackage(pkg);

      setState((prev) => ({
        ...prev,
        package: pkg,
        runtime: {
          status: "loaded",
          runMode: pkg.runMode,
          internalHtml: "",
          internalEntry: pkg.entryCandidates[0] || "",
          externalInstructions: pkg.warnings,
        },
        nodes: [...prev.nodes.filter((node) => node.source !== "package"), ...blueprint.nodes],
        edges: [...prev.edges.filter((edge) => edge.source !== "package"), ...blueprint.edges],
        timeline: [{
          id: uid("evt"),
          timestamp: now(),
          nodeId: prev.currentNodeId,
          type: "load",
          title: `Loaded folder/files: ${pkg.name}`,
          summary: `Inspected ${pkg.importReport.filesFound} files and generated a blueprint.`,
          tags: ["load", "folder", "drop"],
        }, ...prev.timeline],
      }));
      activeTab = "inspect";
      render();
      toast(`Loaded ${list.length} readable file(s).`);
    }

    async function readDroppedEntry(entry, pathPrefix = "") {
      if (!entry) return [];

      if (entry.isFile) {
        return new Promise((resolve) => {
          entry.file((file) => {
            const relativePath = `${pathPrefix}${file.name}`;
            try {
              Object.defineProperty(file, "webkitRelativePath", {
                value: relativePath,
                configurable: true,
              });
            } catch {}
            resolve([file]);
          }, () => resolve([]));
        });
      }

      if (entry.isDirectory) {
        const reader = entry.createReader();
        const entries = [];
        async function readAllEntries() {
          return new Promise((resolve) => {
            reader.readEntries(async (batch) => {
              if (!batch.length) return resolve(entries);
              entries.push(...batch);
              resolve(await readAllEntries());
            }, () => resolve(entries));
          });
        }

        const childEntries = await readAllEntries();
        const nestedFiles = await Promise.all(childEntries.map((child) => readDroppedEntry(child, `${pathPrefix}${entry.name}/`)));
        return nestedFiles.flat();
      }

      return [];
    }

    async function getFilesFromDrop(event) {
      const items = Array.from(event.dataTransfer?.items || []);
      if (items.length) {
        const entryFiles = await Promise.all(items.map((item) => {
          const entry = item.webkitGetAsEntry?.();
          return readDroppedEntry(entry);
        }));
        const files = entryFiles.flat();
        if (files.length) return files;
      }
      return Array.from(event.dataTransfer?.files || []);
    }

    async function handleDrop(event) {
      event.preventDefault();
      event.stopPropagation();
      document.querySelectorAll(".drop-zone").forEach((el) => el.classList.remove("dragging"));

      try {
        const droppedFiles = await getFilesFromDrop(event);
        if (!droppedFiles.length) {
          toast("No readable files were found. For OneDrive/Google Drive placeholders, keep them offline/on this device first.", "warn");
          return;
        }

        const zipFiles = droppedFiles.filter((file) => file.name.toLowerCase().endsWith(".zip"));
        const memFiles = droppedFiles.filter((file) => /\.(json|memsave|memdrawer|memsession)$/i.test(file.name));

        if (zipFiles.length === 1 && droppedFiles.length === 1) {
          await loadZip(zipFiles[0]);
          return;
        }

        if (memFiles.length === 1 && droppedFiles.length === 1) {
          await importMemFile(memFiles[0]);
          return;
        }

        if (zipFiles.length === 1 && droppedFiles.length <= 3) {
          await loadZip(zipFiles[0]);
          return;
        }

        await loadFolder(droppedFiles);
      } catch (error) {
        console.error(error);
        toast("Drop failed. The browser could not read that file/folder.", "warn");
      }
    }

    function wireDropZone(zone) {
      zone.addEventListener("dragover", (event) => {
        event.preventDefault();
        event.stopPropagation();
        zone.classList.add("dragging");
      });
      zone.addEventListener("dragleave", (event) => {
        event.preventDefault();
        event.stopPropagation();
        zone.classList.remove("dragging");
      });
      zone.addEventListener("drop", handleDrop);
    }

    function buildRouteFromNode(nodes, nodeId) {
      const node = nodes.find((item) => item.id === nodeId);
      if (!node) return [];
      const route = [node.id];
      for (const connection of node.connections || []) {
        if (!route.includes(connection)) route.unshift(connection);
        if (route.length >= 8) break;
      }
      return Array.from(new Set(route));
    }

    async function createGameCardFromSaveFile(file) {
      if (!file) return;
      const hash = await sha256File(file);
      const nowTime = now();
      const slotGuess = file.name.replace(/\.[^.]+$/, "").replace(/[^a-z0-9_-]+/gi, "-").toLowerCase() || "slot-imported";
      const card = {
        cardType: "GameCard",
        version: "0.1",
        id: uid("gamecard"),
        gameId: state.project?.id || "unknown-game",
        gameTitle: state.project?.title || "Unknown Game",
        slotId: slotGuess,
        slotTitle: file.name,
        createdAt: nowTime,
        updatedAt: nowTime,
        saveMode: "file-import-fingerprint",
        saveFile: {
          name: file.name,
          relativePath: file.webkitRelativePath || file.name,
          hash,
          sizeBytes: file.size,
          lastModified: file.lastModified ? new Date(file.lastModified).toISOString() : nowTime,
        },
        gameRuntime: {
          runMode: state.package?.runMode || "external-attach",
          executableName: state.package?.detectedExecutables?.[0]?.name || "unknown",
          packageId: state.project?.id || "unknown-package",
        },
      };

      setState((prev) => ({
        ...prev,
        memoryCards: { ...prev.memoryCards, gameCards: [card, ...(prev.memoryCards?.gameCards || [])] },
        timeline: [{
          id: uid("evt"),
          timestamp: nowTime,
          nodeId: prev.currentNodeId,
          type: "load",
          title: `GameCard created: ${file.name}`,
          summary: "Imported save file fingerprint. This stores the mechanical save-state identity.",
          tags: ["GameCard", "save"],
        }, ...prev.timeline],
      }));
      activeTab = "cards";
      render();
    }

    function createPALCardFromCurrentNode() {
      const node = currentNode();

      const nowTime = now();
      const capturesForNode = state.captures.filter((capture) => capture.nodeId === node.id).map((capture) => capture.id);
      const eventsForNode = state.timeline.filter((event) => event.nodeId === node.id).map((event) => event.id);
      const card = {
        cardType: "PALCard",
        version: "0.1",
        id: uid("palcard"),
        gameId: state.project?.id || "unknown-game",
        title: `${node.title} Palace Context`,
        palaceNodeId: node.id,
        currentRoom: node.title,
        createdAt: nowTime,
        updatedAt: nowTime,
        thumbnail: capturesForNode[0] || null,

    function pairCards(gameCardId, palCardId) {
      const gameCard = state.memoryCards.gameCards.find((card) => card.id === gameCardId);
      const palCard = state.memoryCards.palCards.find((card) => card.id === palCardId);
      if (!gameCard || !palCard) return;
      const nowTime = now();
      const pairId = uid("pair");
      const updatedPalCard = {
        ...palCard,
        updatedAt: nowTime,
        pairing: { gameCardId, gameSaveHash: gameCard.saveFile?.hash || null, pairStatus: "synced" },
      };
      const status = getPairStatus(gameCard, updatedPalCard);
      const pair = {
        id: pairId,
        title: `${gameCard.slotTitle} + ${palCard.currentRoom}`,
        gameCardId,
        palCardId,
        status,
        createdAt: nowTime,
        updatedAt: nowTime,
      };

      setState((prev) => ({
        ...prev,
        memoryCards: {
          ...prev.memoryCards,
          activePairId: pairId,
          palCards: (prev.memoryCards?.palCards || []).map((card) => card.id === palCardId ? updatedPalCard : card),
          pairs: [pair, ...(prev.memoryCards?.pairs || [])],
        },
        timeline: [{
          id: uid("evt"),
          timestamp: nowTime,
          nodeId: palCard.palaceNodeId,
          type: "note",
          title: "MEM Save Pair created",
          summary: `${gameCard.slotTitle} paired with ${palCard.currentRoom}.`,
          tags: ["MEM Save Pair", "GameCard", "PALCard"],
        }, ...prev.timeline],
      }));
    }

    function verifyPairs() {
      setState((prev) => {
        const cards = prev.memoryCards;
        const pairs = (cards.pairs || []).map((pair) => {
          const gameCard = cards.gameCards.find((card) => card.id === pair.gameCardId);
          const palCard = cards.palCards.find((card) => card.id === pair.palCardId);
          return { ...pair, status: getPairStatus(gameCard, palCard), updatedAt: now() };
        });
        return { ...prev, memoryCards: { ...cards, pairs } };
      });
    }

      const pair = state.memoryCards.pairs.find((item) => item.id === pairId);

        memoryCards: state.memoryCards,

    async function importMemFile(file) {
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (parsed.sessionVersion && parsed.palaceSnapshot?.nodes) {
          state = normalizeState(parsed.palaceSnapshot);
          saveLocal();
          activeTab = "history";
          render();
          toast("Imported full MEM session.");
          return;
        }
        if (parsed.drawerArchiveVersion && parsed.progressionDrawers) {
          setState((prev) => ({ ...prev, progressionDrawers: parsed.progressionDrawers }));
          activeTab = "history";
          render();
          toast("Imported drawer archive.");
          return;
        }
        if (parsed.drawerVersion && parsed.drawer) {
          setState((prev) => ({
            ...prev,
            progressionDrawers: {
              ...prev.progressionDrawers,
              activeDrawerId: parsed.drawer.drawerId,
              drawers: [parsed.drawer, ...(prev.progressionDrawers?.drawers || [])],
            },
          }));
          activeTab = "history";
          render();
          toast("Imported drawer.");
          return;
        }
        if (parsed.palaceProject?.nodes) {
          state = normalizeState(parsed.palaceProject);
          saveLocal();
          activeTab = "cards";
          render();
          toast("Imported MEM save project snapshot.");
          return;
        }
        if (parsed.memoryCards) {
          setState((prev) => ({ ...prev, memoryCards: parsed.memoryCards }));
          activeTab = "cards";
          render();
          toast("Imported memory cards.");
          return;
        }
        toast("JSON was valid, but it was not a recognised MEM file.", "warn");
      } catch (error) {
        console.error(error);
        toast("Could not import MEM file. The file is not valid JSON.", "warn");
      }
    }

    function buildProgressionDrawer(titleOverride = "") {
      const views = pairViews();
      const activePair = views.find((pair) => pair.id === state.memoryCards.activePairId) || views[0] || null;
      const lastCapture = state.captures?.[0] || null;
      const lastEvent = state.timeline?.[0] || null;
      const drawerId = uid("drawer");
      const node = currentNode();
      const drawerTitle = titleOverride.trim() || `${state.package?.name && state.package.name !== "No package loaded" ? state.package.name : state.project.title} - ${node?.title || "Current Room"}`;
      return {
        drawerId,
        title: drawerTitle,
        type: "progression-drawer",
        status: activePair ? activePair.status : "legacy",
        createdAt: now(),
        updatedAt: now(),
        packageId: state.project?.id || "unknown-package",
        packageName: state.package?.name || state.project.title,
        runtimeMode: state.runtime?.runMode || "none",
        activeTab,
        currentNodeId: state.currentNodeId,
        currentRoom: node?.title || "Unknown Room",
        activePairId: activePair?.id || state.memoryCards.activePairId || "",
        gameCardId: activePair?.gameCardId || "",
        palCardId: activePair?.palCardId || "",
        lastCaptureId: lastCapture?.id || "",
        timelineCursor: lastEvent?.id || "",
        layout: {
          leftPanel: state.runtime?.runMode === "internal-html" ? "internal-html" : "capture",
          rightPanel: "blueprint",
          sidePanel: "memoryCards",
        },
        summary: `Resume ${node?.title || "the current room"} with package, palace, card, and timeline context.`,
      };
    }

    function createProgressionDrawer(titleOverride = "") {

        progressionDrawers: {

        }, ...prev.timeline],

      render();
    }

    function saveFullSession() {

        ...state.progressionDrawers,
        activeDrawerId: drawer.drawerId,

          nodeId: state.currentNodeId,
          type: "checkpoint",

    function deleteDrawer(drawerId) {
      setState((prev) => ({
        ...prev,
        progressionDrawers: {
          ...prev.progressionDrawers,

    async function startCapture() {
      if (!navigator.mediaDevices?.getDisplayMedia) {
        toast("Screen capture is not available in this browser.", "warn");
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
        captureStream = stream;
        if (videoEl) videoEl.srcObject = stream;
        const [track] = stream.getVideoTracks();
        if (track) {
          track.onended = () => {
            captureStream = null;
            if (videoEl) videoEl.srcObject = null;
          };
        }
        toast("Screen capture attached.");
      } catch (error) {
        console.error(error);
        toast("Screen capture was cancelled or blocked.", "warn");
      }
    }

    function stopCapture() {
      if (captureStream) captureStream.getTracks().forEach((track) => track.stop());
      captureStream = null;
      if (videoEl) videoEl.srcObject = null;
      toast("Screen capture stopped.");
    }

    function captureMoment() {
      const video = videoEl;
      if (!video || !video.videoWidth) {
        toast("Start screen capture first, then capture the moment.", "warn");
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        toast("Canvas capture failed in this browser.", "warn");
        return;
      }
      ctx.drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL("image/webp", 0.82);
      const captureId = uid("cap");
      const eventId = uid("evt");
      const node = currentNode();
      setState((prev) => ({
        ...prev,
        captures: [{ id: captureId, nodeId: prev.currentNodeId, screenshot: dataUrl, createdAt: now(), title: `Capture at ${node?.title || "current room"}` }, ...prev.captures],
        nodes: prev.nodes.map((item) => item.id === prev.currentNodeId ? { ...item, screenshots: [captureId, ...(item.screenshots || [])] } : item),
        timeline: [{
          id: eventId,
          timestamp: now(),
          nodeId: prev.currentNodeId,
          type: "capture",
          title: "Captured moment",
          summary: `Screenshot attached to ${node?.title || "current room"}.`,
          tags: ["capture"],
        }, ...prev.timeline],
      }));
    }

      document.getElementById("view-blueprint").innerHTML = `
        <div class="stack">
          <section class="card"><h2>Blueprint Graph</h2><div class="grid-3">${state.nodes.slice(0, 90).map((node) => `<div class="item"><div class="row"><span class="item-title">${escapeHtml(node.title)}</span>${pill(node.type, node.type === "package" ? "purple" : "orange")}</div><p class="faint small">${(node.connections || []).length} connections</p><p class="muted small">${escapeHtml(node.description || "")}</p></div>`).join("")}</div></section>
          <section class="card"><h2>Edges</h2><div class="stack">${state.edges.map((edge) => `<div class="item mono small">${escapeHtml(edge.from)} → ${escapeHtml(edge.to)} · ${escapeHtml(edge.label)}</div>`).join("") || `<p class="muted small">No edges yet.</p>`}</div></section>
        </div>
      `;
    }

    function renderTimeline() {
      document.getElementById("view-timeline").innerHTML = `<div class="stack">${state.timeline.map((event) => `<section class="card"><div class="row"><span class="item-title">${escapeHtml(event.title)}</span>${pill(event.type, "blue")}</div><p class="muted small" style="margin-top:6px">${escapeHtml(event.summary || "")}</p><p class="faint small" style="margin-top:8px">${escapeHtml(event.timestamp)} · ${escapeHtml(event.nodeId)}</p></section>`).join("")}</div>`;
    }

    function renderNotes() {
      const node = currentNode();
      document.getElementById("view-notes").innerHTML = `
        <div class="grid-2">
          <section class="card"><h2>Add Note to ${escapeHtml(node?.title || "Room")}</h2><textarea id="noteText" placeholder="What did the player learn here?"></textarea><button class="btn" style="margin-top:12px" id="saveNoteBtn">Save Note</button></section>
          <section class="card"><h2>Room Notes</h2><div class="stack">${(node?.notes || []).map((note) => `<div class="item small">${escapeHtml(note)}</div>`).join("") || `<p class="muted small">No notes for this room yet.</p>`}</div></section>
        </div>
      `;
      document.getElementById("saveNoteBtn")?.addEventListener("click", addNote);
    }

    function renderBuild() {
      document.getElementById("view-build").innerHTML = `
        <div class="grid-3">
          <section class="card"><h2>Export Project JSON</h2><p class="muted small">Full current palace state.</p><button class="btn" style="margin-top:14px" id="exportProjectBtn">⬇️ Export JSON</button></section>
          <section class="card"><h2>Export HTML Guide</h2><p class="muted small">Readable palace guide for the mapped run.</p><button class="btn" style="margin-top:14px" id="exportHtmlBtn">⬇️ Export HTML</button></section>
          <section class="card"><h2>Export MEM Save Pairs</h2><p class="muted small">All GameCard/PALCard pair data.</p><button class="btn" style="margin-top:14px" id="exportPairsBtn">⬇️ Export Pairs</button></section>
        </div>
      `;
      document.getElementById("exportProjectBtn")?.addEventListener("click", exportProjectJson);
      document.getElementById("exportHtmlBtn")?.addEventListener("click", exportHtmlGuide);
      document.getElementById("exportPairsBtn")?.addEventListener("click", exportAllPairs);
    }

    function render() {
      renderNav();
      renderStats();
      document.querySelectorAll(".view").forEach((view) => view.classList.remove("active"));
      document.getElementById(`view-${activeTab}`)?.classList.add("active");

      renderLoad();
      renderInspect();
      renderPlay();
      renderCards();
      renderHistory();
      renderPalace();
      renderBlueprint();
      renderTimeline();
      renderNotes();
      renderBuild();
    }

    document.getElementById("zipInput").addEventListener("change", (event) => loadZip(event.target.files?.[0]));
    document.getElementById("folderInput").addEventListener("change", (event) => loadFolder(event.target.files));
    document.getElementById("saveInput").addEventListener("change", (event) => createGameCardFromSaveFile(event.target.files?.[0]));
    document.getElementById("memInput").addEventListener("change", (event) => importMemFile(event.target.files?.[0]));

    document.getElementById("app").addEventListener("dragover", (event) => event.preventDefault());
    document.getElementById("app").addEventListener("drop", handleDrop);

    document.getElementById("saveDrawerBtn").addEventListener("click", () => createProgressionDrawer());
    document.getElementById("exportActiveDrawerBtn").addEventListener("click", () => {
      const activeDrawer = state.progressionDrawers.drawers.find((drawer) => drawer.drawerId === state.progressionDrawers.activeDrawerId);
      if (activeDrawer) exportDrawer(activeDrawer);
    });
    document.getElementById("saveFullSessionBtn").addEventListener("click", saveFullSession);

    render();
  </script>
</body>
</html>
