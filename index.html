<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MEM Palace Game Terminal</title>
  <meta name="description" content="Single-file MEM Palace Game Terminal for GitHub Pages." />
  <style>
    :root {
      --bg0: #030201;
      --bg1: #080403;
      --bg2: #3b1d0b;
      --panel: rgba(0, 0, 0, 0.32);
      --panel2: rgba(0, 0, 0, 0.22);
      --line: rgba(253, 186, 116, 0.22);
      --line2: rgba(253, 186, 116, 0.12);
      --orange: #fb923c;
      --orange2: #fdba74;
      --text: #fff7ed;
      --muted: rgba(255, 237, 213, 0.66);
      --muted2: rgba(255, 237, 213, 0.45);
      --green: #86efac;
      --red: #fca5a5;
      --blue: #7dd3fc;
      --purple: #d8b4fe;
      --shadow: rgba(0, 0, 0, 0.30);
    }

    * { box-sizing: border-box; }
    html, body, #root { min-height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, var(--bg2), var(--bg1) 45%, var(--bg0));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.45; }
    .app { min-height: 100vh; padding: 16px; }
    .wrap { width: min(1280px, 100%); margin: 0 auto; display: grid; gap: 16px; }
    .hero, .nav, .card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 28px;
      box-shadow: 0 24px 70px var(--shadow);
    }
    .hero { padding: 16px; }
    .heroRow, .rowBetween { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brandIcon { font-size: 34px; line-height: 1; filter: drop-shadow(0 0 12px rgba(251, 146, 60, .55)); }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(1.35rem, 2.5vw, 1.85rem); letter-spacing: -0.03em; font-weight: 950; }
    h2 { font-size: 1.08rem; font-weight: 850; }
    h3 { font-size: clamp(1.55rem, 3vw, 2rem); color: #fed7aa; }
    .sub { margin-top: 4px; color: var(--muted); font-size: .92rem; }
    .tiny { color: var(--muted2); font-size: .78rem; line-height: 1.45; }
    .muted { color: var(--muted); font-size: .9rem; line-height: 1.55; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; padding: 8px; position: sticky; top: 8px; z-index: 10; backdrop-filter: blur(14px); }
    .navBtn, .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 16px; padding: 10px 12px; border: 1px solid transparent;
      color: var(--text); background: transparent; font-weight: 800; font-size: .88rem;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
      white-space: nowrap;
    }
    .navBtn:hover, .btn:hover { transform: translateY(-1px); background: rgba(253, 186, 116, .10); }
    .navBtn.active, .btn.solid { background: var(--orange); color: #0b0502; }
    .btn.ghost { border-color: var(--line); background: rgba(0,0,0,.20); color: #ffedd5; }
    .btn.full { width: 100%; margin-top: 8px; }
    .layout { display: grid; gap: 16px; grid-template-columns: 280px 1fr; align-items: start; }
    aside { display: grid; gap: 16px; }
    .card { padding: 16px; border-radius: 22px; }
    .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
    .grid4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .playGrid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }
    .space { display: grid; gap: 16px; }
    .spaceSm { display: grid; gap: 10px; }
    .stat { border-radius: 14px; background: rgba(0,0,0,.28); padding: 12px; }
    .statLabel { color: var(--muted2); font-size: .82rem; }
    .statNum { font-size: 1.55rem; font-weight: 950; margin-top: 2px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line);
      border-radius: 999px; padding: 5px 9px; font-size: .74rem; color: #ffedd5;
      background: rgba(253, 186, 116, .10); white-space: nowrap;
    }
    .pill.green { border-color: rgba(134,239,172,.32); background: rgba(134,239,172,.10); color: var(--green); }
    .pill.red { border-color: rgba(252,165,165,.32); background: rgba(252,165,165,.10); color: var(--red); }
    .pill.blue { border-color: rgba(125,211,252,.32); background: rgba(125,211,252,.10); color: var(--blue); }
    .pill.purple { border-color: rgba(216,180,254,.32); background: rgba(216,180,254,.10); color: var(--purple); }
    .tagWrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .input, select, textarea {
      width: 100%; color: var(--text); background: rgba(0,0,0,.38); border: 1px solid var(--line);
      border-radius: 14px; padding: 10px 11px; outline: none;
    }
    textarea { min-height: 150px; resize: vertical; }
    .field span { display: block; color: var(--muted); font-size: .82rem; margin: 0 0 5px; }
    .hidden { display: none; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .listItem, .roomBtn {
      width: 100%; border: 1px solid var(--line2); background: rgba(0,0,0,.28);
      border-radius: 16px; padding: 12px; color: var(--text); text-align: left;
    }
    .roomBtn.active { border-color: rgba(253,186,116,.56); background: rgba(253,186,116,.10); }
    .listItem b, .roomBtn b { font-weight: 900; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fileLine { border-radius: 14px; background: rgba(0,0,0,.30); padding: 10px; }
    .preview {
      width: 100%; height: 480px; border-radius: 16px; border: 1px solid var(--line);
      background: #000; object-fit: contain;
    }
    iframe.preview { background: #fff; }
    ul { margin: 0; padding-left: 22px; }
    li { margin: 4px 0; }
    .buttons { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .roomCreate { display: flex; gap: 8px; margin-top: 16px; }
    .empty { color: var(--muted); font-size: .9rem; }
    .warn { color: #fed7aa; }
    .toast {
      position: fixed; right: 16px; bottom: 16px; z-index: 50; max-width: 420px;
      border: 1px solid var(--line); background: rgba(0,0,0,.82); color: var(--text);
      padding: 12px 14px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
    }
    .caps { text-transform: uppercase; letter-spacing: .08em; }

    @media (max-width: 980px) {
      .layout, .playGrid, .split, .grid4 { grid-template-columns: 1fr; }
      aside { order: 2; }
      main { order: 1; }
      .preview { height: 360px; }
    }
    @media (max-width: 680px) {
      .app { padding: 10px; }
      .grid2, .grid3 { grid-template-columns: 1fr; }
      .nav { position: static; }
      .navBtn { flex: 1 1 auto; }
      .roomCreate { flex-direction: column; }
      .buttons { align-items: stretch; }
      .buttons .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useEffect, useMemo, useRef, useState } from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
    import JSZip from "https://esm.sh/jszip@3.10.1";

    const h = React.createElement;
    const now = () => new Date().toISOString();

    const iconMap = {
      Archive: "▣", BookOpen: "▤", Camera: "◉", CreditCard: "▰", Download: "⇩",
      FileJson: "{}", FolderOpen: "▱", Gamepad2: "🎮", Map: "⌖", Network: "⌁",
      NotebookPen: "✎", PackageOpen: "▤", Play: "▶", Plus: "+", Search: "⌕", Upload: "⇧", Wand2: "✦"
    };

    function I({ name }) {
      return h("span", { className: "mono", "aria-hidden": true }, iconMap[name] || "•");
    }

    const seedProject = {
      project: {
        id: "ff7-pc-beta",
        title: "Final Fantasy VII PC Beta Map",
        subtitle: "Game Load Test Console",
        type: "game-companion",
        createdAt: now(),
        updatedAt: now(),
      },
      package: {
        name: "No package loaded",
        sourceType: "none",
        runMode: "none",
        entryCandidates: [],
        detectedFolders: [],
        detectedFiles: [],
        detectedScripts: [],
        detectedAssets: [],
        detectedExecutables: [],
        warnings: [],
        importReport: null,
      },
      runtime: {
        status: "idle",
        runMode: "none",
        internalHtml: "",
        internalEntry: "",
        externalInstructions: [],
      },
      currentNodeId: "midgar",
      nodes: [
        {
          id: "midgar", type: "location", title: "Midgar", description: "Central city hub and opening region.",
          connections: ["sector-7", "reactor-1", "shinra-building"], characters: ["cloud", "barret", "tifa", "aerith"],
          items: [], events: ["evt-opening"], screenshots: [], notes: ["Use this as the first palace wing for the beta test."],
          tags: ["city", "opening", "hub"], createdAt: now(),
        },
        {
          id: "reactor-1", type: "location", title: "Mako Reactor 1", description: "Opening bombing mission area.",
          connections: ["midgar", "guard-scorpion"], characters: ["cloud", "barret", "biggs", "wedge", "jessie"],
          items: [], events: ["evt-bombing-mission"], screenshots: [], notes: [], tags: ["reactor", "mission", "midgar"], createdAt: now(),
        },
        {
          id: "sector-7", type: "location", title: "Sector 7", description: "Avalanche base area and early story hub.",
          connections: ["midgar", "seventh-heaven"], characters: ["cloud", "barret", "tifa"],
          items: [], events: [], screenshots: [], notes: [], tags: ["slums", "avalanche"], createdAt: now(),
        },
        {
          id: "shinra-building", type: "location", title: "Shinra Building", description: "Major Midgar infiltration sequence.",
          connections: ["midgar"], characters: ["cloud", "barret", "tifa", "aerith", "red-xiii"],
          items: [], events: [], screenshots: [], notes: [], tags: ["midgar", "shinra", "infiltration"], createdAt: now(),
        },
        {
          id: "guard-scorpion", type: "battle", title: "Guard Scorpion", description: "First boss encounter. Watch the tail warning.",
          connections: ["reactor-1"], characters: ["cloud", "barret"], items: [], events: [], screenshots: [],
          notes: ["Capture battle timing and tutorial dialogue."], tags: ["boss", "tutorial", "reactor-1"], createdAt: now(),
        },
      ],
      edges: [
        { id: "edge-midgar-reactor", from: "midgar", to: "reactor-1", label: "mission route" },
        { id: "edge-reactor-boss", from: "reactor-1", to: "guard-scorpion", label: "boss trigger" },
        { id: "edge-midgar-sector", from: "midgar", to: "sector-7", label: "hub path" },
      ],
      timeline: [
        { id: "evt-opening", timestamp: now(), nodeId: "midgar", type: "story", title: "Opening sequence", summary: "Begin mapping the first FF7 run as a memory palace.", tags: ["opening"] },
        { id: "evt-bombing-mission", timestamp: now(), nodeId: "reactor-1", type: "story", title: "Bombing mission begins", summary: "Cloud joins Avalanche during the Reactor 1 mission.", tags: ["mission", "reactor"] },
      ],
      inventory: [],
      characters: [
        { id: "cloud", name: "Cloud Strife", role: "party", notes: [] },
        { id: "barret", name: "Barret Wallace", role: "party", notes: [] },
        { id: "tifa", name: "Tifa Lockhart", role: "party", notes: [] },
        { id: "aerith", name: "Aerith Gainsborough", role: "party", notes: [] },
      ],
      observations: [], captures: [],
      memoryCards: { gameCards: [], palCards: [], pairs: [], activePairId: "" },
      progressionDrawers: { drawers: [], activeDrawerId: "", pinnedDrawerIds: [] },
    };

    const tabs = [
      ["load", "Load", "PackageOpen"], ["inspect", "Inspect", "Search"], ["play", "Run / Attach", "Play"],
      ["cards", "Memory Cards", "CreditCard"], ["history", "Drawers", "Archive"], ["palace", "Palace", "Map"],
      ["blueprint", "Blueprint", "Network"], ["timeline", "Timeline", "NotebookPen"], ["notes", "Notes", "BookOpen"], ["build", "Build", "Wand2"],
    ];

    function uid(prefix = "id") { return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`; }
    function ext(name = "") { const parts = name.toLowerCase().split("."); return parts.length > 1 ? parts.pop() : ""; }
    function slug(input = "mem-palace") { return String(input).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "mem-palace"; }
    function cls(...parts) { return parts.filter(Boolean).join(" "); }
    function escapeHtml(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
    }
    async function sha256File(file) {
      const buffer = await file.arrayBuffer();
      const digest = await crypto.subtle.digest("SHA-256", buffer);
      return Array.from(new Uint8Array(digest)).map((byte) => byte.toString(16).padStart(2, "0")).join("");
    }
    function downloadText(filename, text, type = "text/plain") {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      setTimeout(() => URL.revokeObjectURL(url), 250);
    }
    function statusTone(status) {
      if (status === "synced") return "green";
      if (status === "out-of-sync" || status === "conflict") return "red";
      if (status?.startsWith("missing")) return "red";
      if (status === "legacy") return "purple";
      return "blue";
    }
    function getPairStatus(gameCard, palCard) {
      if (!gameCard && !palCard) return "unpaired";
      if (!gameCard) return "missing-gamecard";
      if (!palCard) return "missing-palcard";
      const pairing = palCard.pairing || {};
      if (!pairing.gameCardId || pairing.gameCardId !== gameCard.id) return "unpaired";
      if (pairing.gameSaveHash && gameCard.saveFile?.hash && pairing.gameSaveHash !== gameCard.saveFile.hash) return "out-of-sync";
      return "synced";
    }
    function buildRouteFromNode(nodes, nodeId) {
      const node = nodes.find((item) => item.id === nodeId);
      if (!node) return [];
      const route = [node.id];
      for (const connection of node.connections || []) {
        if (!route.includes(connection)) route.unshift(connection);
        if (route.length >= 8) break;
      }
      return Array.from(new Set(route));
    }
    function inspectFiles(files, sourceType, packageName) {
      const fileList = files.map((file) => ({
        name: file.name,
        path: file.path || file.webkitRelativePath || file.name,
        size: file.size || 0,
        type: file.type || "",
        extension: ext(file.name),
      }));
      const folders = Array.from(new Set(fileList.map((file) => file.path.split("/").slice(0, -1).join("/")).filter(Boolean)));
      const scripts = fileList.filter((file) => ["js", "ts", "mjs", "jsx", "tsx"].includes(file.extension));
      const assets = fileList.filter((file) => ["png", "jpg", "jpeg", "webp", "gif", "svg", "mp3", "ogg", "wav", "mp4", "webm"].includes(file.extension));
      const executables = fileList.filter((file) => ["exe", "bat", "cmd", "app"].includes(file.extension));
      const htmlEntries = fileList.filter((file) => file.name.toLowerCase() === "index.html" || file.extension === "html");
      const jsonFiles = fileList.filter((file) => file.extension === "json");
      let runMode = "external-attach";
      const warnings = [];
      if (htmlEntries.length) runMode = "internal-html";
      else if (executables.length) warnings.push("Native executables cannot be run inside the browser sandbox. Use External Attach Mode.");
      else { runMode = "inspect-only"; warnings.push("No browser-runnable entry point was detected. Blueprint inspection is still available."); }
      return {
        name: packageName, sourceType, runMode,
        entryCandidates: [...htmlEntries.map((file) => file.path), ...executables.map((file) => file.path)],
        detectedFolders: folders, detectedFiles: fileList, detectedScripts: scripts, detectedAssets: assets,
        detectedExecutables: executables, detectedJson: jsonFiles, warnings,
        importReport: { filesFound: fileList.length, foldersFound: folders.length, assetsFound: assets.length, scriptsFound: scripts.length, executablesFound: executables.length, generatedAt: now() },
      };
    }
    function createBlueprintFromPackage(pkg) {
      const nodes = [{ id: "pkg-root", type: "package", source: "package", title: pkg.name || "Loaded Package", description: `Source: ${pkg.sourceType}. Run mode: ${pkg.runMode}.`, tags: ["package", pkg.sourceType, pkg.runMode].filter(Boolean) }];
      const edges = [];
      for (const folder of pkg.detectedFolders || []) {
        const id = `folder-${slug(folder)}`;
        nodes.push({ id, type: "folder", source: "package", title: folder, description: "Detected package folder.", tags: ["folder"] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "contains", source: "package" });
      }
      for (const file of pkg.detectedExecutables || []) {
        const id = `exe-${slug(file.path)}`;
        nodes.push({ id, type: "executable", source: "package", title: file.name, description: file.path, tags: ["executable"] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "entry candidate", source: "package" });
      }
      for (const file of pkg.detectedScripts || []) {
        const id = `script-${slug(file.path)}`;
        nodes.push({ id, type: "script", source: "package", title: file.name, description: file.path, tags: ["script", file.extension] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "script", source: "package" });
      }
      for (const file of (pkg.detectedAssets || []).slice(0, 40)) {
        const id = `asset-${slug(file.path)}`;
        nodes.push({ id, type: "asset", source: "package", title: file.name, description: file.path, tags: ["asset", file.extension] });
        edges.push({ id: `edge-root-${id}`, from: "pkg-root", to: id, label: "asset", source: "package" });
      }
      return { nodes, edges };
    }

    function Button({ children, onClick, variant = "solid", disabled = false, className = "" }) {
      return h("button", { onClick, disabled, className: cls("btn", variant, className) }, children);
    }
    function Field({ label, children }) { return h("label", { className: "field" }, h("span", null, label), children); }
    function Card({ children, className = "" }) { return h("div", { className: cls("card", className) }, children); }
    function Pill({ children, tone = "orange" }) { return h("span", { className: cls("pill", tone !== "orange" && tone) }, children); }
    function MotionWrap({ children, className = "" }) {
      return h("div", { className }, children);
    }

    function PairCreator({ gameCards, palCards, onPair }) {
      const [gameCardId, setGameCardId] = useState("");
      const [palCardId, setPalCardId] = useState("");
      return h("div", { className: "grid3" },
        h(Field, { label: "GameCard" }, h("select", { value: gameCardId, onChange: (event) => setGameCardId(event.target.value) },
          h("option", { value: "" }, "Choose GameCard"),
          gameCards.map((card) => h("option", { key: card.id, value: card.id }, card.slotTitle))
        )),
        h(Field, { label: "PALCard" }, h("select", { value: palCardId, onChange: (event) => setPalCardId(event.target.value) },
          h("option", { value: "" }, "Choose PALCard"),
          palCards.map((card) => h("option", { key: card.id, value: card.id }, card.title))
        )),
        h("div", { style: { display: "flex", alignItems: "end" } }, h(Button, { disabled: !gameCardId || !palCardId, onClick: () => onPair(gameCardId, palCardId) }, "Pair Cards"))
      );
    }

    function MemPalaceGameTerminal() {
      const [data, setData] = useState(seedProject);
      const [activeTab, setActiveTab] = useState("load");
      const [noteText, setNoteText] = useState("");
      const [newNodeTitle, setNewNodeTitle] = useState("");
      const [captureStream, setCaptureStream] = useState(null);
      const [hasLoadedStoredProject, setHasLoadedStoredProject] = useState(false);
      const [toast, setToast] = useState("");

      const zipInputRef = useRef(null);
      const folderInputRef = useRef(null);
      const saveFileInputRef = useRef(null);
      const memSaveInputRef = useRef(null);
      const videoRef = useRef(null);

      function notify(message) {
        setToast(message);
        window.clearTimeout(notify._t);
        notify._t = window.setTimeout(() => setToast(""), 3600);
      }

      useEffect(() => {
        try {
          const raw = localStorage.getItem("mem-palace-game-terminal-v1");
          if (raw) setData(JSON.parse(raw));
        } catch {}
        finally { setHasLoadedStoredProject(true); }
      }, []);

      useEffect(() => {
        if (!hasLoadedStoredProject) return;
        try { localStorage.setItem("mem-palace-game-terminal-v1", JSON.stringify(data)); }
        catch { notify("Local storage is full. Export a full session and clear old captures if needed."); }
      }, [data, hasLoadedStoredProject]);

      const memoryCards = data.memoryCards || { gameCards: [], palCards: [], pairs: [], activePairId: "" };
      const progressionDrawers = data.progressionDrawers || { drawers: [], activeDrawerId: "", pinnedDrawerIds: [] };
      const currentNode = useMemo(() => data.nodes.find((node) => node.id === data.currentNodeId) || data.nodes[0], [data.nodes, data.currentNodeId]);
      const pairViews = useMemo(() => (memoryCards.pairs || []).map((pair) => {
        const gameCard = (memoryCards.gameCards || []).find((card) => card.id === pair.gameCardId);
        const palCard = (memoryCards.palCards || []).find((card) => card.id === pair.palCardId);
        return { ...pair, gameCard, palCard, status: getPairStatus(gameCard, palCard) };
      }), [memoryCards]);

      function updateData(updater) {
        setData((prev) => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          return { ...next, project: { ...next.project, updatedAt: now() } };
        });
      }

      async function loadZip(file) {
        if (!file) return;
        try {
          const zip = await JSZip.loadAsync(await file.arrayBuffer());
          const files = Object.values(zip.files).filter((entry) => !entry.dir).map((entry) => ({ name: entry.name.split("/").pop(), path: entry.name, size: entry._data?.uncompressedSize || 0, type: "" }));
          const pkg = inspectFiles(files, "zip", file.name.replace(/\.zip$/i, ""));
          const blueprint = createBlueprintFromPackage(pkg);
          let runtime = { status: "loaded", runMode: pkg.runMode, internalHtml: "", internalEntry: pkg.entryCandidates[0] || "", externalInstructions: pkg.warnings };
          if (pkg.runMode === "internal-html") {
            const entry = pkg.entryCandidates.find((candidate) => candidate.toLowerCase().endsWith(".html"));
            const html = entry ? await zip.file(entry)?.async("string") : "";
            runtime = { ...runtime, internalHtml: html || "<p>No HTML entry could be loaded.</p>", internalEntry: entry || "" };
